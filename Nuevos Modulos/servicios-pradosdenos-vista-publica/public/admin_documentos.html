<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Registrar Documento</title></head>
<body>
  <h1>Registrar Documento Comunitario</h1>
  <form id="docForm">
    <input name="nombre" placeholder="Nombre del documento" required><br>
    <textarea name="descripcion" placeholder="Descripción"></textarea><br>
    <input name="link_drive" placeholder="Enlace de Drive" required><br>
    <input type="date" name="fecha_publicacion" required><br>
    <select name="tipo_documento_id" required>
      <option value="">-- Tipo de documento --</option>
      <option value="1">Acta</option>
      <option value="2">Reglamento</option>
      <option value="3">Circular</option>
    </select><br>
    <label><input type="checkbox" name="visible" checked> Visible</label><br>
    <input name="subido_por" placeholder="UUID admin" required><br>
    <button type="submit">Guardar</button>
  </form>
  <script>
    document.getElementById('docForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      data.visible = data.visible === 'on';
      const res = await fetch('/api/documentos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      alert((await res.json()).message);
    });
  </script>
</body>
</html>
