<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador QR para Plazas - Prados de Nos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        .card-header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            border: none;
            padding: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-success {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed #ddd;
            text-align: center;
            margin: 20px 0;
        }
        .plaza-card {
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .plaza-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .loading {
            display: none;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card fade-in">
                    <div class="card-header text-center">
                        <h2><i class="fas fa-qrcode me-3"></i>Generador QR para Plazas</h2>
                        <p class="mb-0">Sistema de Check-in Comunitario - Prados de Nos</p>
                    </div>
                    <div class="card-body">
                        <!-- Controles principales -->
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <button class="btn btn-primary w-100" onclick="loadPlazas()">
                                    <i class="fas fa-sync-alt me-2"></i>Cargar Plazas
                                </button>
                            </div>
                            <div class="col-md-6">
                                <button class="btn btn-success w-100" onclick="generateAllQRs()" disabled id="generateAllBtn">
                                    <i class="fas fa-download me-2"></i>Generar Todos los QR
                                </button>
                            </div>
                        </div>

                        <!-- Loading indicator -->
                        <div class="loading text-center" id="loadingIndicator">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Cargando...</span>
                            </div>
                            <p class="mt-2">Cargando plazas...</p>
                        </div>

                        <!-- Lista de plazas -->
                        <div id="plazasList" class="row">
                            <div class="col-12 text-center text-muted">
                                <i class="fas fa-map-marker-alt fa-3x mb-3"></i>
                                <p>Haz clic en "Cargar Plazas" para comenzar</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para QR individual -->
    <div class="modal fade" id="qrModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fas fa-qrcode me-2"></i>Código QR - <span id="modalPlazaName"></span>
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <div id="qrDisplay" class="qr-container"></div>
                    <div class="mt-3">
                        <p><strong>URL de Check-in:</strong></p>
                        <code id="qrUrl" class="d-block p-2 bg-light rounded"></code>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-success" onclick="downloadQR()">
                        <i class="fas fa-download me-2"></i>Descargar QR
                    </button>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Cerrar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPlazas = [];
        let currentQRCanvas = null;
        let currentPlazaName = '';

        // Función para hacer requests autenticados
        async function authenticatedFetch(url, options = {}) {
            const defaultOptions = {
                method: 'GET',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            };
            
            const finalOptions = { ...defaultOptions, ...options };
            
            try {
                const response = await fetch(url, finalOptions);
                
                if (response.status === 401) {
                    alert('Sesión expirada. Redirigiendo al login...');
                    window.location.href = '/admin-login.html';
                    return null;
                }
                
                return response;
            } catch (error) {
                console.error('Error en request autenticado:', error);
                throw error;
            }
        }

        // Cargar plazas desde la API
        async function loadPlazas() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const plazasList = document.getElementById('plazasList');
            const generateAllBtn = document.getElementById('generateAllBtn');
            
            loadingIndicator.style.display = 'block';
            plazasList.innerHTML = '';
            
            try {
                const response = await authenticatedFetch('/api/admin/plazas');
                if (!response) return;
                
                if (response.ok) {
                    const data = await response.json();
                    currentPlazas = data.data || [];
                    renderPlazas();
                    generateAllBtn.disabled = currentPlazas.length === 0;
                } else {
                    throw new Error('Error al cargar plazas');
                }
            } catch (error) {
                console.error('Error cargando plazas:', error);
                plazasList.innerHTML = `
                    <div class="col-12 text-center text-danger">
                        <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                        <p>Error al cargar las plazas. Inténtalo de nuevo.</p>
                    </div>
                `;
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }

        // Renderizar lista de plazas
        function renderPlazas() {
            const plazasList = document.getElementById('plazasList');
            
            if (currentPlazas.length === 0) {
                plazasList.innerHTML = `
                    <div class="col-12 text-center text-muted">
                        <i class="fas fa-info-circle fa-2x mb-3"></i>
                        <p>No hay plazas registradas en el sistema</p>
                    </div>
                `;
                return;
            }

            plazasList.innerHTML = currentPlazas.map(plaza => `
                <div class="col-md-6 col-lg-4">
                    <div class="plaza-card card h-100">
                        <div class="card-body">
                            <h5 class="card-title">
                                <i class="fas fa-map-marker-alt text-primary me-2"></i>
                                ${plaza.nombre}
                            </h5>
                            <p class="card-text text-muted">
                                <small><i class="fas fa-map me-1"></i>${plaza.direccion || 'Sin dirección'}</small>
                            </p>
                            <div class="d-grid gap-2">
                                <button class="btn btn-outline-primary" onclick="generateQR(${plaza.id}, '${plaza.nombre.replace(/'/g, "\\'")}')">
                                    <i class="fas fa-qrcode me-2"></i>Ver QR
                                </button>
                                <button class="btn btn-sm btn-outline-success" onclick="copyCheckinUrl(${plaza.id})">
                                    <i class="fas fa-copy me-2"></i>Copiar URL
                                </button>
                            </div>
                            <div class="mt-2 text-center">
                                <small class="text-muted">
                                    <i class="fas fa-check-circle me-1"></i>
                                    ${plaza.total_checkins || 0} check-ins
                                </small>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Generar QR para una plaza específica
        function generateQR(plazaId, plazaName) {
            const checkinUrl = `${window.location.origin}/checkin.html?plaza=${plazaId}`;
            
            currentPlazaName = plazaName;
            document.getElementById('modalPlazaName').textContent = plazaName;
            document.getElementById('qrUrl').textContent = checkinUrl;
            
            // Limpiar el contenedor del QR
            const qrDisplay = document.getElementById('qrDisplay');
            qrDisplay.innerHTML = '';
            
            // Generar el código QR
            QRCode.toCanvas(qrDisplay, checkinUrl, {
                width: 300,
                margin: 2,
                color: {
                    dark: '#000000',
                    light: '#FFFFFF'
                }
            }, function (error, canvas) {
                if (error) {
                    console.error('Error generando QR:', error);
                    qrDisplay.innerHTML = '<p class="text-danger">Error al generar QR</p>';
                } else {
                    currentQRCanvas = canvas;
                    // Mostrar el modal
                    const modal = new bootstrap.Modal(document.getElementById('qrModal'));
                    modal.show();
                }
            });
        }

        // Descargar QR actual
        function downloadQR() {
            if (currentQRCanvas) {
                const link = document.createElement('a');
                link.download = `QR_${currentPlazaName.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                link.href = currentQRCanvas.toDataURL();
                link.click();
            }
        }

        // Copiar URL de check-in al portapapeles
        async function copyCheckinUrl(plazaId) {
            const checkinUrl = `${window.location.origin}/checkin.html?plaza=${plazaId}`;
            
            try {
                await navigator.clipboard.writeText(checkinUrl);
                // Mostrar confirmación temporal
                const button = event.target.closest('button');
                const originalText = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check me-2"></i>Copiado!';
                button.classList.add('btn-success');
                button.classList.remove('btn-outline-success');
                
                setTimeout(() => {
                    button.innerHTML = originalText;
                    button.classList.remove('btn-success');
                    button.classList.add('btn-outline-success');
                }, 2000);
            } catch (error) {
                console.error('Error copiando URL:', error);
                alert('No se pudo copiar la URL. Cópiala manualmente desde el modal.');
            }
        }

        // Generar todos los QRs y descargarlos
        async function generateAllQRs() {
            if (currentPlazas.length === 0) {
                alert('No hay plazas para generar QRs');
                return;
            }

            const generateAllBtn = document.getElementById('generateAllBtn');
            generateAllBtn.disabled = true;
            generateAllBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Generando...';

            try {
                for (let i = 0; i < currentPlazas.length; i++) {
                    const plaza = currentPlazas[i];
                    const checkinUrl = `${window.location.origin}/checkin.html?plaza=${plaza.id}`;
                    
                    await new Promise((resolve) => {
                        QRCode.toCanvas(checkinUrl, {
                            width: 300,
                            margin: 2,
                            color: {
                                dark: '#000000',
                                light: '#FFFFFF'
                            }
                        }, function (error, canvas) {
                            if (!error) {
                                const link = document.createElement('a');
                                link.download = `QR_${plaza.nombre.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                                link.href = canvas.toDataURL();
                                link.click();
                            }
                            // Pequeño delay entre descargas
                            setTimeout(resolve, 500);
                        });
                    });
                }
                
                alert(`Se generaron ${currentPlazas.length} códigos QR`);
            } catch (error) {
                console.error('Error generando QRs:', error);
                alert('Error al generar algunos códigos QR');
            } finally {
                generateAllBtn.disabled = false;
                generateAllBtn.innerHTML = '<i class="fas fa-download me-2"></i>Generar Todos los QR';
            }
        }

        // Cargar plazas automáticamente al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            loadPlazas();
        });
    </script>
</body>
</html>
