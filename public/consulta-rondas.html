<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Rondas - Los Prados de Nos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-main {
            padding: 30px 0;
        }
        
        .header-section {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            color: white;
            transform: scale(1.05);
        }
        
        .main-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .results-section {
            min-height: 300px;
        }
        
        .ronda-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }
        
        .ronda-item:hover {
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .ronda-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .plaza-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
        }
        
        .fecha-hora {
            color: #667eea;
            font-weight: 600;
        }
        
        .guardia-info {
            color: #666;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .no-results {
            text-align: center;
            padding: 50px;
            color: #666;
        }
        
        .no-results i {
            font-size: 3rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .status-recent {
            background: #d4edda;
            color: #155724;
        }
        
        .status-today {
            background: #cce7ff;
            color: #004085;
        }
        
        .status-old {
            background: #f8f9fa;
            color: #6c757d;
        }
        
        @media (max-width: 768px) {
            .ronda-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .container-main {
                padding: 20px 10px;
            }
            
            .main-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Volver
    </a>
    
    <div class="container-main">
        <div class="container">
            <!-- Header -->
            <div class="header-section">
                <h1><i class="fas fa-shield-alt"></i> Consulta de Rondas</h1>
                <p>Revisa las rondas de seguridad realizadas en tu plaza</p>
            </div>
            
            <!-- Main Card -->
            <div class="main-card">
                <!-- Filter Section -->
                <div class="filter-section">
                    <h5><i class="fas fa-filter"></i> Filtros de Búsqueda</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="plazaSelect" class="form-label">Seleccionar Plaza</label>
                            <select class="form-select" id="plazaSelect">
                                <option value="">Todas las plazas</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fechaFiltro" class="form-label">Filtrar por Fecha</label>
                            <select class="form-select" id="fechaFiltro">
                                <option value="hoy">Hoy</option>
                                <option value="ayer">Ayer</option>
                                <option value="semana">Última semana</option>
                                <option value="mes">Último mes</option>
                                <option value="todos">Todos los registros</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="buscarRondas()">
                        <i class="fas fa-search"></i> Buscar Rondas
                    </button>
                    <button class="btn btn-outline-secondary ms-2" onclick="limpiarFiltros()">
                        <i class="fas fa-times"></i> Limpiar
                    </button>
                </div>
                
                <!-- Results Section -->
                <div class="results-section" id="resultados">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin fa-2x"></i>
                        <p>Cargando rondas de seguridad...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script>
        let plazas = [];
        let rondas = [];
        
        // Cargar datos al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            cargarPlazas();
            buscarRondas();
        });
        
        async function cargarPlazas() {
            try {
                const response = await fetch('/api/plazas');
                if (response.ok) {
                    plazas = await response.json();
                    const select = document.getElementById('plazaSelect');
                    
                    plazas.forEach(plaza => {
                        const option = document.createElement('option');
                        option.value = plaza.id;
                        option.textContent = plaza.nombre;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Error al cargar plazas:', error);
            }
        }
        
        async function buscarRondas() {
            const resultados = document.getElementById('resultados');
            const plazaId = document.getElementById('plazaSelect').value;
            const fechaFiltro = document.getElementById('fechaFiltro').value;
            
            // Mostrar loading
            resultados.innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p>Buscando rondas...</p>
                </div>
            `;
            
            try {
                let url = '/api/checkins/public?';
                if (plazaId) url += `plaza_id=${plazaId}&`;
                if (fechaFiltro && fechaFiltro !== 'todos') url += `periodo=${fechaFiltro}&`;
                
                const response = await fetch(url);
                if (response.ok) {
                    const data = await response.json();
                    if (data.success) {
                        rondas = data.checkins;
                        mostrarResultados(rondas);
                    } else {
                        throw new Error(data.message || 'Error al buscar rondas');
                    }
                } else {
                    throw new Error('Error al buscar rondas');
                }
            } catch (error) {
                console.error('Error:', error);
                resultados.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h5>Error al cargar datos</h5>
                        <p>No se pudieron cargar las rondas. Por favor, intenta nuevamente.</p>
                        <button class="btn btn-primary" onclick="buscarRondas()">
                            <i class="fas fa-refresh"></i> Reintentar
                        </button>
                    </div>
                `;
            }
        }
        
        function mostrarResultados(rondas) {
            const resultados = document.getElementById('resultados');
            
            if (rondas.length === 0) {
                resultados.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-search"></i>
                        <h5>No se encontraron rondas</h5>
                        <p>No hay registros que coincidan con los filtros seleccionados.</p>
                        <button class="btn btn-outline-primary" onclick="limpiarFiltros()">
                            <i class="fas fa-times"></i> Limpiar Filtros
                        </button>
                    </div>
                `;
                return;
            }
            
            let html = `<h5><i class="fas fa-list"></i> Resultados (${rondas.length} rondas encontradas)</h5>`;
            
            rondas.forEach(ronda => {
                const fecha = new Date(ronda.fecha);
                const ahora = new Date();
                const diferencia = ahora - fecha;
                const horas = diferencia / (1000 * 60 * 60);
                
                let statusClass = 'status-old';
                let statusText = 'Hace más de 24h';
                
                if (horas < 2) {
                    statusClass = 'status-recent';
                    statusText = 'Reciente';
                } else if (horas < 24) {
                    statusClass = 'status-today';
                    statusText = 'Hoy';
                }
                
                html += `
                    <div class="ronda-item">
                        <div class="ronda-header">
                            <div>
                                <div class="plaza-name">
                                    <i class="fas fa-map-marker-alt"></i> ${ronda.plaza_nombre}
                                </div>
                                <div class="guardia-info">
                                    <i class="fas fa-user"></i> ${ronda.guardia_nombre}
                                </div>
                            </div>
                            <div class="text-end">
                                <div class="fecha-hora">
                                    <i class="fas fa-clock"></i> ${formatearFecha(fecha)}
                                </div>
                                <span class="status-badge ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            resultados.innerHTML = html;
        }
        
        function formatearFecha(fecha) {
            const opciones = {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'America/Santiago'
            };
            return fecha.toLocaleDateString('es-CL', opciones);
        }
        
        function limpiarFiltros() {
            document.getElementById('plazaSelect').value = '';
            document.getElementById('fechaFiltro').value = 'hoy';
            buscarRondas();
        }
        
        // Auto-refresh cada 2 minutos
        setInterval(function() {
            // Solo auto-refresh si no hay filtros específicos
            const plazaSelect = document.getElementById('plazaSelect').value;
            const fechaFiltro = document.getElementById('fechaFiltro').value;
            
            if (!plazaSelect && fechaFiltro === 'hoy') {
                buscarRondas();
            }
        }, 120000);
    </script>
</body>
</html>
