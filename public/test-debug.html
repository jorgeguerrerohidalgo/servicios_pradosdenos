<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Verificar Funciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Test de Funciones</h1>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>Test Eventos</h5>
                        <button class="btn btn-primary" onclick="testEventModal()">Test Modal Evento</button>
                        <button class="btn btn-warning" onclick="testEventoAPI()">Test API Eventos</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>Test Documentos</h5>
                        <button class="btn btn-primary" onclick="testDocModal()">Test Modal Documento</button>
                        <button class="btn btn-warning" onclick="testDocumentoAPI()">Test API Documentos</button>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5>Test Admin Panel</h5>
                        <button class="btn btn-primary" onclick="testAdminFunctions()">Test Funciones Admin</button>
                        <a href="/admin-panel.html" class="btn btn-success">Ir a Admin Panel</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="results" class="mt-4"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function testEventModal() {
            console.log('Test: Verificando función verDetalleEvento...');
            if (typeof verDetalleEvento === 'function') {
                document.getElementById('results').innerHTML = '<div class="alert alert-success">✅ Función verDetalleEvento existe</div>';
            } else {
                document.getElementById('results').innerHTML = '<div class="alert alert-danger">❌ Función verDetalleEvento NO existe</div>';
            }
        }
        
        function testEventoAPI() {
            fetch('/api/eventos')
                .then(response => response.json())
                .then(data => {
                    console.log('API Eventos:', data);
                    document.getElementById('results').innerHTML = `<div class="alert alert-success">✅ API Eventos: ${data.success ? 'OK' : 'ERROR'} - ${data.data ? data.data.length : 0} eventos</div>`;
                })
                .catch(error => {
                    console.error('Error API Eventos:', error);
                    document.getElementById('results').innerHTML = '<div class="alert alert-danger">❌ Error en API Eventos</div>';
                });
        }
        
        function testDocModal() {
            console.log('Test: Verificando función verDetalleDocumento...');
            if (typeof verDetalleDocumento === 'function') {
                document.getElementById('results').innerHTML = '<div class="alert alert-success">✅ Función verDetalleDocumento existe</div>';
            } else {
                document.getElementById('results').innerHTML = '<div class="alert alert-danger">❌ Función verDetalleDocumento NO existe</div>';
            }
        }
        
        function testDocumentoAPI() {
            fetch('/api/documentos')
                .then(response => response.json())
                .then(data => {
                    console.log('API Documentos:', data);
                    document.getElementById('results').innerHTML = `<div class="alert alert-success">✅ API Documentos: ${data.success ? 'OK' : 'ERROR'} - ${data.data ? data.data.length : 0} documentos</div>`;
                })
                .catch(error => {
                    console.error('Error API Documentos:', error);
                    document.getElementById('results').innerHTML = '<div class="alert alert-danger">❌ Error en API Documentos</div>';
                });
        }
        
        function testAdminFunctions() {
            const functions = ['editEvento', 'deleteEvento', 'editDocumento', 'deleteDocumento', 'editAdmin', 'deleteAdmin'];
            let results = '<h5>Verificando funciones del Admin Panel:</h5>';
            
            functions.forEach(func => {
                if (typeof window[func] === 'function') {
                    results += `<div class="alert alert-success">✅ ${func} existe</div>`;
                } else {
                    results += `<div class="alert alert-danger">❌ ${func} NO existe</div>`;
                }
            });
            
            document.getElementById('results').innerHTML = results;
        }
    </script>
</body>
</html>
