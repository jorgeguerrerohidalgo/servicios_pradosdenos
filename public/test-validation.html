<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Validación Código - Los Prados de Nos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        .test-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .code-display {
            background: #e8f4f8;
            border: 2px solid #3498db;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .code-display .code {
            font-size: 24px;
            font-weight: bold;
            color: #3498db;
            font-family: 'Courier New', monospace;
        }
        .feedback-success {
            color: #27ae60;
            font-weight: bold;
        }
        .feedback-error {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h1><i class="fas fa-vial"></i> Test Validación de Código</h1>
            <p class="text-muted">Prueba la validación del código de check-in</p>
        </div>

        <div class="test-section">
            <h5><i class="fas fa-key"></i> Código de Validación Simulado</h5>
            <div class="code-display">
                <div class="code" id="testCode">ABC123</div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="generateNewCode()">
                <i class="fas fa-refresh"></i> Generar Nuevo Código
            </button>
        </div>

        <div class="test-section">
            <h5><i class="fas fa-keyboard"></i> Ingresa el Código</h5>
            <div class="mb-3">
                <input type="text" 
                       id="codeInput" 
                       class="form-control" 
                       placeholder="Ingresa el código..." 
                       maxlength="10"
                       style="text-align: center; font-size: 20px; font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">
                <div id="feedback" class="form-text mt-2"></div>
            </div>
            <button id="confirmBtn" class="btn btn-success w-100" disabled>
                <i class="fas fa-check"></i> Confirmar Código
            </button>
        </div>

        <div class="test-section">
            <h5><i class="fas fa-info-circle"></i> Registro de Pruebas</h5>
            <div id="testLog" class="bg-light border rounded p-3" style="height: 200px; overflow-y: auto; font-family: monospace; font-size: 14px;">
                <div class="text-muted">Registro de pruebas...</div>
            </div>
        </div>

        <div class="text-center">
            <a href="guardia-checkin.html" class="btn btn-primary">
                <i class="fas fa-arrow-left"></i> Volver al Check-in
            </a>
        </div>
    </div>

    <script>
        let currentCode = 'ABC123';
        
        function log(message) {
            const logDiv = document.getElementById('testLog');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function generateNewCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            currentCode = code;
            document.getElementById('testCode').textContent = code;
            log(`Nuevo código generado: ${code}`);
            
            // Limpiar input
            document.getElementById('codeInput').value = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('confirmBtn').disabled = true;
        }
        
        function validateCode() {
            const input = document.getElementById('codeInput');
            const feedback = document.getElementById('feedback');
            const confirmBtn = document.getElementById('confirmBtn');
            
            const enteredCode = input.value.trim().toUpperCase();
            const expectedCode = currentCode.toUpperCase();
            
            log(`Código ingresado: "${enteredCode}" | Código esperado: "${expectedCode}"`);
            
            if (enteredCode.length === 0) {
                feedback.textContent = '';
                feedback.className = 'form-text';
                confirmBtn.disabled = true;
                log('Campo vacío - botón deshabilitado');
            } else if (enteredCode === expectedCode) {
                feedback.textContent = '✓ Código correcto';
                feedback.className = 'form-text feedback-success';
                confirmBtn.disabled = false;
                log('✓ Código correcto - botón habilitado');
            } else {
                feedback.textContent = '✗ Código incorrecto';
                feedback.className = 'form-text feedback-error';
                confirmBtn.disabled = true;
                log('✗ Código incorrecto - botón deshabilitado');
            }
        }
        
        function confirmCode() {
            const enteredCode = document.getElementById('codeInput').value.trim().toUpperCase();
            const expectedCode = currentCode.toUpperCase();
            
            if (enteredCode === expectedCode) {
                alert('¡Código confirmado exitosamente!');
                log('🎉 Código confirmado exitosamente');
                
                // Generar nuevo código para la siguiente prueba
                setTimeout(generateNewCode, 1000);
            } else {
                alert('Error: Código incorrecto');
                log('❌ Error: Código incorrecto');
            }
        }
        
        // Event listeners
        document.getElementById('codeInput').addEventListener('input', validateCode);
        document.getElementById('confirmBtn').addEventListener('click', confirmCode);
        
        // Permitir confirmar con Enter
        document.getElementById('codeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !document.getElementById('confirmBtn').disabled) {
                confirmCode();
            }
        });
        
        // Inicializar
        document.addEventListener('DOMContentLoaded', function() {
            log('Test de validación iniciado');
            log(`Código inicial: ${currentCode}`);
        });
    </script>
</body>
</html>
