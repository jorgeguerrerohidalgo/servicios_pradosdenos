<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in QR</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    #reader { margin: 20px auto; }
    .status { margin: 10px 0; padding: 10px; border-radius: 5px; }
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    .logout-btn { 
      position: absolute; 
      top: 10px; 
      right: 10px; 
      padding: 5px 10px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
  <h1>Escanea el QR de la plaza</h1>
  <div id="status"></div>
  <div id="reader" style="width: 300px;"></div>
  <div id="history">
    <h3>Últimos Check-ins</h3>
    <div id="historyList"></div>
  </div>
  
  <script>
    let html5QrCode;
    
    // Función para obtener la URL base de la API
    function getApiUrl() {
      return window.location.origin;
    }
    
    // Verificar autenticación al cargar
    async function checkAuth() {
      try {
        const res = await fetch(`${getApiUrl()}/api/auth/check`, {
          credentials: 'include'
        });
        const result = await res.json();
        if (!result.authenticated) {
          window.location.href = '/login.html';
          return false;
        }
        document.querySelector('h1').textContent = `Hola ${result.guardia.nombre}, escanea el QR de la plaza`;
        return true;
      } catch (error) {
        console.error('Error verificando autenticación:', error);
        window.location.href = '/login.html';
        return false;
      }
    }
    
    // Cargar historial
    async function loadHistory() {
      try {
        const res = await fetch(`${getApiUrl()}/api/checkin/history`, {
          credentials: 'include'
        });
        const history = await res.json();
        
        const historyList = document.getElementById('historyList');
        if (history.length === 0) {
          historyList.innerHTML = '<p>No hay check-ins previos</p>';
          return;
        }
        
        historyList.innerHTML = history.map(item => 
          `<div style="margin: 5px 0; padding: 5px; border: 1px solid #ddd; border-radius: 3px;">
            <strong>${item.plaza_nombre}</strong><br>
            <small>${new Date(item.fecha).toLocaleString()}</small>
          </div>`
        ).join('');
      } catch (error) {
        console.error('Error cargando historial:', error);
      }
    }
    
    // Función de logout
    async function logout() {
      try {
        await fetch(`${getApiUrl()}/api/auth/logout`, {
          credentials: 'include'
        });
        window.location.href = '/login.html';
      } catch (error) {
        console.error('Error en logout:', error);
        window.location.href = '/login.html';
      }
    }
    
    // Mostrar mensajes de estado
    function showStatus(message, isError = false) {
      const status = document.getElementById('status');
      status.className = `status ${isError ? 'error' : 'success'}`;
      status.textContent = message;
      
      setTimeout(() => {
        status.textContent = '';
        status.className = 'status';
      }, 5000);
    }
    
    // Inicializar la aplicación
    async function init() {
      if (!(await checkAuth())) return;
      
      await loadHistory();
      
      html5QrCode = new Html5Qrcode("reader");
      
      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          async qrCodeMessage => {
            try {
              showStatus('Procesando check-in...');
              
              const res = await fetch(`${getApiUrl()}/api/checkin`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ token: qrCodeMessage })
              });
              
              const result = await res.json();
              
              if (res.ok) {
                showStatus(`Check-in exitoso en ${result.plaza}!`);
                await loadHistory(); // Recargar historial
              } else {
                showStatus(result.error || 'Error en el check-in', true);
              }
            } catch (error) {
              console.error('Error en check-in:', error);
              showStatus('Error de conexión durante el check-in', true);
            }
          },
          errorMessage => {
            // Silenciar errores de escaneo normales
          }
        );
      } catch (error) {
        console.error('Error iniciando cámara:', error);
        showStatus('Error al acceder a la cámara. Verifica los permisos.', true);
      }
    }
    
    // Inicializar cuando la página esté lista
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
