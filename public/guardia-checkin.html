<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in QR - Los Prados de Nos</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #2c3e50;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .validation-code-display {
      background: #e8f4f8;
      border: 2px solid #3498db;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 30px;
    }
    .validation-code-display h3 {
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .validation-code {
      font-size: 32px;
      font-weight: bold;
      color: #3498db;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
    }
    #reader { 
      margin: 20px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #ddd;
    }
    .status { 
      margin: 15px 0; 
      padding: 15px; 
      border-radius: 10px; 
      font-weight: 500;
      display: none;
    }
    .status.success { 
      background-color: #d4edda; 
      color: #155724; 
      border: 1px solid #c3e6cb; 
      display: block;
    }
    .status.error { 
      background-color: #f8d7da; 
      color: #721c24; 
      border: 1px solid #f5c6cb; 
      display: block;
    }
    .status.info { 
      background-color: #e2e3e5; 
      color: #383d41; 
      border: 1px solid #d6d8db; 
      display: block;
    }
    .history-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin-top: 30px;
    }
    .history-item {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .history-item:last-child {
      margin-bottom: 0;
    }
    .plaza-name {
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 5px;
    }
    .checkin-date {
      color: #7f8c8d;
      font-size: 14px;
    }
    .btn-logout {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(220, 53, 69, 0.9);
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      color: white;
      font-size: 14px;
    }
    .btn-logout:hover {
      background: rgba(220, 53, 69, 1);
    }
    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }
    .step {
      flex: 1;
      text-align: center;
      padding: 10px;
      background: #ecf0f1;
      border-radius: 8px;
      margin: 0 5px;
      font-size: 14px;
      color: #7f8c8d;
    }
    .step.active {
      background: #3498db;
      color: white;
    }
    .step.completed {
      background: #27ae60;
      color: white;
    }
    .validation-input {
      margin-bottom: 20px;
    }
    .validation-input input {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .validation-input input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }
    .validation-input .form-text {
      font-size: 12px;
      color: #6c757d;
    }
    .btn-success {
      background: linear-gradient(45deg, #27ae60, #2ecc71);
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      font-size: 16px;
    }
    .btn-success:hover {
      background: linear-gradient(45deg, #229954, #27ae60);
    }
    .btn-success:disabled {
      background: #95a5a6;
      opacity: 0.6;
    }
    .code-match {
      color: #27ae60 !important;
      font-weight: bold;
    }
    .code-mismatch {
      color: #e74c3c !important;
      font-weight: bold;
    }
    .scanner-controls {
      text-align: center;
      margin: 20px 0;
    }
    .scanner-controls button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <button class="btn btn-danger btn-logout" onclick="logout()">
    <i class="fas fa-sign-out-alt"></i> Salir
  </button>
  
  <!-- Botón de diagnóstico temporal -->
  <button class="btn btn-info" onclick="showDebugInfo()" style="position: absolute; top: 20px; left: 20px; z-index: 1000;">
    <i class="fas fa-bug"></i> Debug
  </button>
  
  <!-- Botón para simular QR -->
  <button class="btn btn-warning" onclick="simulateQRScan()" style="position: absolute; top: 70px; left: 20px; z-index: 1000;">
    <i class="fas fa-qrcode"></i> Simular QR
  </button>
  
  <!-- Botón para probar validación directa -->
  <button class="btn btn-success" onclick="testDirectValidation()" style="position: absolute; top: 120px; left: 20px; z-index: 1000; font-size: 12px;">
    <i class="fas fa-check"></i> Test Direct
  </button>

  <!-- Botones de debugging adicionales -->
  <button class="btn btn-info" onclick="testClickEvent()" style="position: absolute; top: 170px; left: 20px; z-index: 1000; font-size: 10px;">
    <i class="fas fa-bug"></i> Test Click
  </button>
  
  <button class="btn btn-danger" onclick="forceConfirmCheckin()" style="position: absolute; top: 220px; left: 20px; z-index: 1000; font-size: 10px;">
    <i class="fas fa-bolt"></i> Force Check-in
  </button>
  
  <button class="btn btn-secondary" onclick="checkEventListeners()" style="position: absolute; top: 270px; left: 20px; z-index: 1000; font-size: 10px;">
    <i class="fas fa-search"></i> Check Events
  </button>
  
  <button class="btn btn-warning" onclick="checkForOverlays()" style="position: absolute; top: 320px; left: 20px; z-index: 1000; font-size: 10px;">
    <i class="fas fa-layer-group"></i> Check Overlays
  </button>
  
  <button class="btn btn-primary" onclick="repairButton()" style="position: absolute; top: 370px; left: 20px; z-index: 1000; font-size: 10px;">
    <i class="fas fa-tools"></i> Repair Button
  </button>
  
  <!-- Botón de emergencia -->
  <button class="btn btn-danger" onclick="emergencyCheckin()" style="position: absolute; top: 420px; left: 20px; z-index: 1000; font-size: 10px; background: red;">
    <i class="fas fa-exclamation-triangle"></i> Emergency Check-in
  </button>

  <div class="container">
    <div class="header">
      <h1><i class="fas fa-qrcode"></i> Check-in Plaza</h1>
      <p id="welcomeMessage" class="text-muted">Cargando...</p>
    </div>

    <!-- Código de validación del guardia -->
    <div class="validation-code-display" id="validationCodeDisplay">
      <h3><i class="fas fa-key"></i> Tu Código de Validación</h3>
      <div class="validation-code" id="userValidationCode">----</div>
      <small class="text-muted">Memoriza este código, lo necesitarás para cada check-in</small>
    </div>

    <!-- Indicador de pasos -->
    <div class="step-indicator">
      <div class="step active" id="step1">
        <i class="fas fa-qrcode"></i><br>
        1. Escanear QR
      </div>
      <div class="step" id="step2">
        <i class="fas fa-keyboard"></i><br>
        2. Código
      </div>
      <div class="step" id="step3">
        <i class="fas fa-check"></i><br>
        3. Confirmar
      </div>
    </div>

    <!-- Mensajes de estado -->
    <div id="status" class="status"></div>

    <!-- Sección de escaneo QR -->
    <div id="qrScanSection">
      <h4><i class="fas fa-camera"></i> Escanear QR de la Plaza</h4>
      <div id="reader"></div>
      <div class="scanner-controls">
        <button id="startScanBtn" class="btn btn-primary" onclick="startScanning()">
          <i class="fas fa-camera"></i> Iniciar Escáner
        </button>
        <button id="stopScanBtn" class="btn btn-secondary" onclick="stopScanning()" style="display: none;">
          <i class="fas fa-stop"></i> Detener Escáner
        </button>
      </div>
    </div>

    <!-- Sección de validación -->
    <div id="validationSection" style="display: none;">
      <h4><i class="fas fa-key"></i> Ingresa tu Código de Validación</h4>
      <div class="validation-input">
        <input type="text" id="validationCodeInput" class="form-control" placeholder="----" maxlength="10" autocomplete="off">
        <div class="form-text">Ingresa el código que aparece arriba</div>
        <div id="codeValidationFeedback" class="form-text"></div>
      </div>
      <div class="d-grid gap-2">
        <button id="confirmCheckinBtn" class="btn btn-success" onclick="confirmCheckin()" disabled>
          <i class="fas fa-check"></i> Confirmar Check-in
        </button>
        <button class="btn btn-secondary" onclick="resetProcess()">
          <i class="fas fa-arrow-left"></i> Volver a Escanear
        </button>
      </div>
    </div>

    <!-- Historial de check-ins -->
    <div class="history-section">
      <h4><i class="fas fa-history"></i> Últimos Check-ins</h4>
      <div id="historyList">
        <div class="text-center text-muted">
          <i class="fas fa-spinner fa-spin"></i> Cargando historial...
        </div>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode = null;
    let scannedToken = null;
    let userValidationCode = null;
    let isScanning = false;
    
    // Función para obtener la URL base de la API
    function getApiUrl() {
      return window.location.origin;
    }
    
    // Verificar autenticación y cargar datos del guardia
    async function checkAuth() {
      try {
        const res = await fetch(`${getApiUrl()}/api/auth/check`, {
          credentials: 'include'
        });
        const result = await res.json();
        
        if (!result.authenticated || result.guardia.tipo !== 'guardia') {
          window.location.href = '/guardia-login.html';
          return false;
        }
        
        document.getElementById('welcomeMessage').textContent = 
          `Bienvenido ${result.guardia.nombre}`;
        
        return true;
      } catch (error) {
        console.error('Error verificando autenticación:', error);
        window.location.href = '/guardia-login.html';
        return false;
      }
    }
    
    // Cargar código de validación del guardia
    async function loadValidationCode() {
      console.log('=== CARGANDO CÓDIGO DE VALIDACIÓN ===');
      try {
        const url = `${getApiUrl()}/api/checkin/validation-code`;
        console.log('URL:', url);
        
        const res = await fetch(url, {
          credentials: 'include'
        });
        
        console.log('Response status:', res.status);
        console.log('Response ok:', res.ok);
        
        const result = await res.json();
        console.log('Response data:', result);
        
        if (result.success) {
          userValidationCode = result.validation_code;
          document.getElementById('userValidationCode').textContent = userValidationCode;
          console.log('✅ Código de validación cargado:', userValidationCode);
          console.log('Tipo de userValidationCode:', typeof userValidationCode);
          console.log('Longitud del código:', userValidationCode ? userValidationCode.length : 'NULL');
        } else {
          console.error('❌ Error al cargar código de validación:', result.message);
          showStatus('Error al cargar código de validación', 'error');
        }
      } catch (error) {
        console.error('❌ Error cargando código de validación:', error);
        showStatus('Error de conexión al cargar código', 'error');
      }
      console.log('=== FIN CARGA CÓDIGO ===');
    }
    
    // Cargar historial de check-ins
    async function loadHistory() {
      try {
        const res = await fetch(`${getApiUrl()}/api/checkin/history`, {
          credentials: 'include'
        });
        const result = await res.json();
        
        const historyList = document.getElementById('historyList');
        
        if (result.success && result.historial.length > 0) {
          historyList.innerHTML = result.historial.map(item => 
            `<div class="history-item">
              <div class="plaza-name">${item.plaza_nombre}</div>
              <div class="checkin-date">
                <i class="fas fa-clock"></i> ${new Date(item.fecha).toLocaleString('es-CL')}
              </div>
            </div>`
          ).join('');
        } else {
          historyList.innerHTML = '<div class="text-center text-muted">No hay check-ins previos</div>';
        }
      } catch (error) {
        console.error('Error cargando historial:', error);
        document.getElementById('historyList').innerHTML = 
          '<div class="text-center text-muted">Error al cargar historial</div>';
      }
    }
    
    // Mostrar mensajes de estado
    function showStatus(message, type = 'info') {
      const status = document.getElementById('status');
      status.className = `status ${type}`;
      status.textContent = message;
      
      setTimeout(() => {
        status.style.display = 'none';
      }, 5000);
    }
    
    // Actualizar indicador de pasos
    function updateSteps(currentStep) {
      for (let i = 1; i <= 3; i++) {
        const step = document.getElementById(`step${i}`);
        step.classList.remove('active', 'completed');
        
        if (i < currentStep) {
          step.classList.add('completed');
        } else if (i === currentStep) {
          step.classList.add('active');
        }
      }
    }
    
    // Iniciar escaneo QR
    async function startScanning() {
      if (isScanning) return;
      
      try {
        html5QrCode = new Html5Qrcode("reader");
        
        const cameras = await Html5QrCode.getCameras();
        const cameraId = cameras.length > 0 ? cameras[cameras.length - 1].id : undefined;
        
        await html5QrCode.start(
          cameraId,
          { fps: 10, qrbox: { width: 250, height: 250 } },
          (decodedText) => {
            scannedToken = decodedText;
            stopScanning();
            showValidationSection();
            showStatus('QR escaneado correctamente. Ahora ingresa tu código de validación.', 'success');
          },
          (errorMessage) => {
            // Silenciar errores de escaneo normales
          }
        );
        
        isScanning = true;
        document.getElementById('startScanBtn').style.display = 'none';
        document.getElementById('stopScanBtn').style.display = 'inline-block';
        
      } catch (error) {
        console.error('Error iniciando cámara:', error);
        showStatus('Error al acceder a la cámara. Verifica los permisos.', 'error');
      }
    }
    
    // Detener escaneo QR
    async function stopScanning() {
      if (!isScanning || !html5QrCode) return;
      
      try {
        await html5QrCode.stop();
        isScanning = false;
        document.getElementById('startScanBtn').style.display = 'inline-block';
        document.getElementById('stopScanBtn').style.display = 'none';
      } catch (error) {
        console.error('Error deteniendo escáner:', error);
      }
    }
    
    // Mostrar sección de validación
    function showValidationSection() {
      console.log('=== MOSTRANDO SECCIÓN DE VALIDACIÓN ===');
      
      document.getElementById('qrScanSection').style.display = 'none';
      document.getElementById('validationSection').style.display = 'block';
      const input = document.getElementById('validationCodeInput');
      
      // Limpiar input anterior
      input.value = '';
      document.getElementById('codeValidationFeedback').textContent = '';
      document.getElementById('confirmCheckinBtn').disabled = true;
      
      console.log('Input elemento:', input);
      console.log('userValidationCode en showValidationSection:', userValidationCode);
      
      // Función de validación reutilizable
      function validateInput() {
        console.log('=== VALIDANDO INPUT ===');
        const enteredCode = input.value.trim().toUpperCase();
        const feedback = document.getElementById('codeValidationFeedback');
        const confirmBtn = document.getElementById('confirmCheckinBtn');
        
        console.log('Código ingresado (raw):', input.value);
        console.log('Código ingresado (procesado):', enteredCode);
        console.log('Código esperado:', userValidationCode);
        console.log('Código esperado (procesado):', userValidationCode ? userValidationCode.toUpperCase() : 'NULL');
        
        if (enteredCode.length === 0) {
          feedback.textContent = '';
          feedback.className = 'form-text';
          confirmBtn.disabled = true;
          console.log('→ Campo vacío, botón deshabilitado');
        } else if (userValidationCode && enteredCode === userValidationCode.toUpperCase()) {
          feedback.textContent = '✓ Código correcto';
          feedback.className = 'form-text code-match';
          confirmBtn.disabled = false;
          console.log('→ Código correcto, botón HABILITADO');
          
          // 🔧 SOLUCIÓN: Asegurar que el botón funcione cuando se habilita
          ensureButtonWorks();
        } else {
          feedback.textContent = '✗ Código incorrecto';
          feedback.className = 'form-text code-mismatch';
          confirmBtn.disabled = true;
          console.log('→ Código incorrecto, botón deshabilitado');
        }
        
        console.log('Estado final del botón disabled:', confirmBtn.disabled);
        console.log('=== FIN VALIDACIÓN ===');
      }
      
      // Limpiar event listeners anteriores
      input.oninput = null;
      input.onkeypress = null;
      input.onkeyup = null;
      
      // Múltiples formas de capturar el evento
      input.oninput = validateInput;
      input.onkeyup = validateInput;
      input.addEventListener('input', validateInput);
      input.addEventListener('keyup', validateInput);
      
      // Event listener para Enter
      function handleEnter(e) {
        if (e.key === 'Enter' && !document.getElementById('confirmCheckinBtn').disabled) {
          console.log('Enter presionado, ejecutando confirmCheckin()');
          confirmCheckin();
        }
      }
      
      input.onkeypress = handleEnter;
      input.addEventListener('keypress', handleEnter);
      
      console.log('Event listeners agregados correctamente');
      console.log('input.oninput:', typeof input.oninput);
      console.log('input.onkeyup:', typeof input.onkeyup);
      
      // 🔧 SOLUCIÓN: Configurar el botón de forma robusta
      setupButtonRobustly();
      
      // Auto-focus en el input
      setTimeout(() => {
        input.focus();
        console.log('Focus aplicado al input');
      }, 100);
      
      updateSteps(2);
    }
    
    // Confirmar check-in
    async function confirmCheckin() {
      console.log('🚀 === CONFIRM CHECKIN EJECUTADO ===');
      console.log('Timestamp:', new Date().toISOString());
      
      // Mostrar alerta visual para debugging
      const debugAlert = document.createElement('div');
      debugAlert.className = 'alert alert-info';
      debugAlert.innerHTML = '<strong>DEBUG:</strong> confirmCheckin() ejecutado - ' + new Date().toLocaleTimeString();
      debugAlert.style.position = 'fixed';
      debugAlert.style.top = '10px';
      debugAlert.style.right = '10px';
      debugAlert.style.zIndex = '9999';
      debugAlert.style.minWidth = '300px';
      document.body.appendChild(debugAlert);
      setTimeout(() => debugAlert.remove(), 3000);
      
      const enteredCode = document.getElementById('validationCodeInput').value.trim();
      const confirmBtn = document.getElementById('confirmCheckinBtn');
      
      if (!enteredCode) {
        showStatus('Por favor ingresa tu código de validación', 'error');
        return;
      }
      
      if (!userValidationCode) {
        showStatus('Error: No se ha cargado el código de validación. Intenta recargar la página.', 'error');
        return;
      }
      
      if (enteredCode.toUpperCase() !== userValidationCode.toUpperCase()) {
        showStatus('Código de validación incorrecto. Revisa el código mostrado arriba.', 'error');
        return;
      }
      
      try {
        // Deshabilitar botón durante el proceso
        confirmBtn.disabled = true;
        confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
        
        updateSteps(3);
        showStatus('Procesando check-in...', 'info');
        
        const res = await fetch(`${getApiUrl()}/api/checkin`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ 
            token: scannedToken, 
            validation_code: enteredCode 
          })
        });
        
        const result = await res.json();
        
        if (result.success) {
          showStatus(`¡Check-in exitoso en ${result.checkin.plaza}!`, 'success');
          await loadHistory();
          
          // Mostrar mensaje de éxito más prominente
          const successMessage = document.createElement('div');
          successMessage.className = 'alert alert-success text-center';
          successMessage.innerHTML = `
            <i class="fas fa-check-circle fa-3x mb-3"></i>
            <h4>¡Check-in Exitoso!</h4>
            <p>Plaza: <strong>${result.checkin.plaza}</strong></p>
            <p>Hora: <strong>${new Date(result.checkin.fecha).toLocaleString('es-CL')}</strong></p>
          `;
          document.querySelector('.container').insertBefore(successMessage, document.getElementById('validationSection'));
          
          // Resetear después de 4 segundos
          setTimeout(() => {
            successMessage.remove();
            resetProcess();
          }, 4000);
        } else {
          showStatus(result.error || 'Error en el check-in', 'error');
          // Restaurar botón
          confirmBtn.disabled = false;
          confirmBtn.innerHTML = '<i class="fas fa-check"></i> Confirmar Check-in';
        }
      } catch (error) {
        console.error('Error en check-in:', error);
        showStatus('Error de conexión. Intenta nuevamente.', 'error');
        // Restaurar botón
        confirmBtn.disabled = false;
        confirmBtn.innerHTML = '<i class="fas fa-check"></i> Confirmar Check-in';
      }
    }
    
    // Resetear proceso
    function resetProcess() {
      scannedToken = null;
      document.getElementById('validationCodeInput').value = '';
      document.getElementById('codeValidationFeedback').textContent = '';
      document.getElementById('confirmCheckinBtn').disabled = true;
      document.getElementById('qrScanSection').style.display = 'block';
      document.getElementById('validationSection').style.display = 'none';
      updateSteps(1);
    }
    
    // Función de logout
    async function logout() {
      try {
        await fetch(`${getApiUrl()}/api/auth/logout`, {
          credentials: 'include'
        });
        window.location.href = '/guardia-login.html';
      } catch (error) {
        console.error('Error en logout:', error);
        window.location.href = '/guardia-login.html';
      }
    }
    
    // Función de debug temporal
    function showDebugInfo() {
      const debugInfo = {
        userValidationCode: userValidationCode,
        userValidationCodeType: typeof userValidationCode,
        userValidationCodeLength: userValidationCode ? userValidationCode.length : 'NULL',
        scannedToken: scannedToken,
        isScanning: isScanning,
        currentInput: document.getElementById('validationCodeInput').value,
        buttonDisabled: document.getElementById('confirmCheckinBtn').disabled,
        validationSectionVisible: document.getElementById('validationSection').style.display !== 'none'
      };
      
      console.log('=== DEBUG INFO ===');
      console.table(debugInfo);
      console.log('=== END DEBUG ===');
      
      // Mostrar también en alert para facilitar visualización
      alert(`DEBUG INFO:
userValidationCode: ${userValidationCode}
Tipo: ${typeof userValidationCode}
Longitud: ${userValidationCode ? userValidationCode.length : 'NULL'}
Input actual: "${document.getElementById('validationCodeInput').value}"
Botón deshabilitado: ${document.getElementById('confirmCheckinBtn').disabled}
Sección visible: ${document.getElementById('validationSection').style.display !== 'none'}`);
    }

    function checkEventListeners() {
      console.log('=== CHECK EVENT LISTENERS ===');

    // Función para reparar el botón si hay problemas
    function repairButton() {
      console.log('=== REPARANDO BOTÓN ===');
      const confirmBtn = document.getElementById('confirmCheckinBtn');
      
      if (!confirmBtn) {
        console.error('❌ Botón no encontrado');
        return;
      }
      
      // Usar las funciones robustas
      setupButtonRobustly();
      ensureButtonWorks();
      
      // Verificar que esté habilitado si el código es correcto
      const input = document.getElementById('validationCodeInput');
      const enteredCode = input.value.trim().toUpperCase();
      
      if (userValidationCode && enteredCode === userValidationCode.toUpperCase()) {
        console.log('✅ Código correcto, habilitando botón');
        confirmBtn.disabled = false;
        
        const feedback = document.getElementById('codeValidationFeedback');
        feedback.textContent = '✓ Código correcto';
        feedback.className = 'form-text code-match';
      }
      
      console.log('✅ Botón reparado completamente');
      console.log('Botón disabled:', confirmBtn.disabled);
      console.log('Botón onclick:', confirmBtn.onclick);
      
      // Mostrar estado del botón
      alert(`Botón reparado:
- Disabled: ${confirmBtn.disabled}
- onclick: ${confirmBtn.onclick ? 'Definido' : 'No definido'}
- Posición: ${confirmBtn.getBoundingClientRect().top}px
- Z-index: ${window.getComputedStyle(confirmBtn).zIndex}`);
    }

    // 🔧 SOLUCIÓN: Configurar el botón de forma robusta
    function setupButtonRobustly() {
      console.log('=== CONFIGURANDO BOTÓN ROBUSTAMENTE ===');
      const confirmBtn = document.getElementById('confirmCheckinBtn');
      
      if (!confirmBtn) {
        console.error('❌ Botón no encontrado');
        return;
      }
      
      // Verificar el onclick original
      console.log('onclick original:', confirmBtn.onclick);
      
      // Asegurar que el onclick funcione
      if (!confirmBtn.onclick) {
        console.log('⚠️ No hay onclick, asignando...');
        confirmBtn.onclick = function() {
          console.log('onclick asignado ejecutado');
          confirmCheckin();
        };
      }
      
      // Añadir event listener como backup ROBUSTO
      confirmBtn.addEventListener('click', function(e) {
        console.log('🔧 Event listener backup ejecutado');
        console.log('Botón disabled:', confirmBtn.disabled);
        console.log('Event target:', e.target);
        console.log('Event currentTarget:', e.currentTarget);
        
        if (!confirmBtn.disabled) {
          console.log('✅ Ejecutando confirmCheckin desde event listener backup');
          e.preventDefault();
          e.stopPropagation();
          confirmCheckin();
        } else {
          console.log('⚠️ Botón deshabilitado, no ejecutando');
        }
      }, { passive: false });
      
      // Añadir event listener para mousedown como backup adicional
      confirmBtn.addEventListener('mousedown', function(e) {
        console.log('🔧 Mousedown backup ejecutado');
        if (!confirmBtn.disabled) {
          console.log('✅ Ejecutando confirmCheckin desde mousedown backup');
          setTimeout(() => {
            confirmCheckin();
          }, 100);
        }
      }, { passive: false });
      
      // Corregir estilos que puedan interferir
      confirmBtn.style.pointerEvents = 'auto';
      confirmBtn.style.position = 'relative';
      confirmBtn.style.zIndex = '1000';
      
      console.log('✅ Botón configurado robustamente');
    }
    
    // 🔧 SOLUCIÓN: Asegurar que el botón funcione cuando se habilita
    function ensureButtonWorks() {
      console.log('=== ASEGURANDO QUE EL BOTÓN FUNCIONE ===');
      const confirmBtn = document.getElementById('confirmCheckinBtn');
      
      if (!confirmBtn) {
        console.error('❌ Botón no encontrado');
        return;
      }
      
      // Verificar que el botón esté accesible
      setTimeout(() => {
        const rect = confirmBtn.getBoundingClientRect();
        console.log('Botón rect:', rect);
        
        // Verificar que no hay elementos superpuestos
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const elementsAtCenter = document.elementsFromPoint(centerX, centerY);
        const buttonIndex = elementsAtCenter.indexOf(confirmBtn);
        
        console.log('Elementos en el centro:', elementsAtCenter.length);
        console.log('Índice del botón:', buttonIndex);
        
        if (buttonIndex > 0) {
          console.log('⚠️ Elementos superpuestos detectados, corrigiendo...');
          // Incrementar z-index para asegurar que esté encima
          confirmBtn.style.zIndex = '9999';
          confirmBtn.style.position = 'relative';
        }
        
        // Verificar que el onclick funcione
        if (!confirmBtn.onclick) {
          console.log('⚠️ onclick perdido, restaurando...');
          confirmBtn.onclick = function() {
            console.log('onclick restaurado ejecutado');
            confirmCheckin();
          };
        }
      }, 100);
    }

    // 🔧 SOLUCIÓN: Monitor automático del botón
    function startButtonMonitor() {
      console.log('=== INICIANDO MONITOR DEL BOTÓN ===');
      
      // Verificar el botón cada 2 segundos
      setInterval(() => {
        const confirmBtn = document.getElementById('confirmCheckinBtn');
        
        if (!confirmBtn) return;
        
        // Si el botón está habilitado pero no tiene onclick, repararlo
        if (!confirmBtn.disabled && !confirmBtn.onclick) {
          console.log('⚠️ Botón habilitado sin onclick detectado, reparando...');
          setupButtonRobustly();
        }
        
        // Verificar que no hay overlays cuando está habilitado
        if (!confirmBtn.disabled) {
          const rect = confirmBtn.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          const elementsAtCenter = document.elementsFromPoint(centerX, centerY);
          const buttonIndex = elementsAtCenter.indexOf(confirmBtn);
          
          if (buttonIndex > 0) {
            console.log('⚠️ Overlay detectado, corrigiendo z-index...');
            confirmBtn.style.zIndex = '9999';
            confirmBtn.style.position = 'relative';
          }
        }
      }, 2000);
      
      console.log('✅ Monitor del botón iniciado');
    }

    // 🔧 SOLUCIÓN: Check-in de emergencia
    function emergencyCheckin() {
      console.log('=== EMERGENCY CHECK-IN ===');
      
      const input = document.getElementById('validationCodeInput');
      const confirmBtn = document.getElementById('confirmCheckinBtn');
      
      if (!userValidationCode) {
        alert('Error: No se ha cargado el código de validación');
        return;
      }
      
      if (!scannedToken) {
        alert('Error: No se ha escaneado ningún QR. Usa "Simular QR" primero.');
        return;
      }
      
      const enteredCode = input.value.trim();
      
      if (!enteredCode) {
        alert('Por favor ingresa tu código de validación');
        return;
      }
      
      if (enteredCode.toUpperCase() !== userValidationCode.toUpperCase()) {
        alert('Código de validación incorrecto');
        return;
      }
      
      // Confirmar la acción
      if (confirm('¿Estás seguro de que quieres realizar el check-in de emergencia?')) {
        console.log('✅ Ejecutando check-in de emergencia...');
        
        // Forzar la ejecución
        confirmBtn.disabled = false;
        confirmCheckin();
      }
    }

    // 🔧 SOLUCIÓN: Indicador visual del estado del botón
    function addButtonStatusIndicator() {
      const confirmBtn = document.getElementById('confirmCheckinBtn');
      
      if (!confirmBtn) return;
      
      // Crear indicador si no existe
      let indicator = document.getElementById('buttonStatusIndicator');
      if (!indicator) {
        indicator = document.createElement('div');
        indicator.id = 'buttonStatusIndicator';
        indicator.style.cssText = `
          position: absolute;
          top: -10px;
          right: -10px;
          width: 20px;
          height: 20px;
          border-radius: 50%;
          background: red;
          z-index: 10000;
          opacity: 0.8;
          pointer-events: none;
        `;
        confirmBtn.parentElement.style.position = 'relative';
        confirmBtn.parentElement.appendChild(indicator);
      }
      
      // Actualizar color basado en el estado
      const updateIndicator = () => {
        if (confirmBtn.disabled) {
          indicator.style.background = 'gray';
          indicator.title = 'Botón deshabilitado';
        } else if (confirmBtn.onclick) {
          indicator.style.background = 'green';
          indicator.title = 'Botón funcional';
        } else {
          indicator.style.background = 'red';
          indicator.title = 'Botón sin onclick';
        }
      };
      
      updateIndicator();
      
      // Actualizar cada segundo
      setInterval(updateIndicator, 1000);
    }

    // Manejar tecla Enter en el campo de validación (se maneja en showValidationSection)
    
    // Inicializar la aplicación
    async function init() {
      if (!(await checkAuth())) return;
      
      await loadValidationCode();
      await loadHistory();
      
      // 🔧 SOLUCIÓN: Configurar el botón de forma robusta al inicializar
      setTimeout(() => {
        setupButtonRobustly();
        startButtonMonitor();
        addButtonStatusIndicator();
        console.log('✅ Botón configurado robustamente en init()');
      }, 500);
      
      // Auto-iniciar escáner
      setTimeout(startScanning, 1000);
    }
    
    // Inicializar cuando la página esté lista
    document.addEventListener('DOMContentLoaded', init);
  </script>
