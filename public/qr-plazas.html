<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR para Plazas - Los Prados de Nos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- QR Code Library con fallback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.3/qrcode.min.js" 
            onerror="this.onerror=null; this.src='https://unpkg.com/qrcode@1.5.3/build/qrcode.min.js'"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-main {
            padding: 30px 0;
        }
        
        .header-section {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            color: white;
            transform: scale(1.05);
        }
        
        .card {
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
        }
        
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            padding: 20px;
            border: none;
        }
        
        .card-body {
            padding: 30px;
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .qr-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-top: 30px;
        }
        
        .qr-code {
            margin: 20px 0;
            display: inline-block;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
        }
        
        .qr-info {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .qr-info h5 {
            color: #495057;
            margin-bottom: 15px;
        }
        
        .qr-info p {
            margin: 5px 0;
            color: #6c757d;
        }
        
        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #155724;
            border-radius: 10px;
        }
        
        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #721c24;
            border-radius: 10px;
        }
        
        .alert-info {
            background: rgba(13, 202, 240, 0.1);
            border: 1px solid rgba(13, 202, 240, 0.3);
            color: #0c5460;
            border-radius: 10px;
        }
        
        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #664d03;
            border-radius: 10px;
        }
        
        .plaza-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .plaza-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .plaza-card:hover {
            transform: translateY(-5px);
        }
        
        .plaza-card h6 {
            color: #495057;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        .plaza-card .qr-code {
            margin: 10px 0;
            padding: 15px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        
        .loading .spinner-border {
            width: 3rem;
            height: 3rem;
            color: #667eea;
        }
        
        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2rem;
            }
            
            .card-body {
                padding: 20px;
            }
            
            .qr-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <a href="/admin-panel.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Volver al Panel
    </a>
    
    <div class="container container-main">
        <div class="header-section">
            <h1><i class="fas fa-qrcode"></i> Generador de QR para Plazas</h1>
            <p class="lead">Genera códigos QR para identificar las plazas del condominio</p>
        </div>
        
        <!-- Generador Individual -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-plus-circle"></i> Generar QR Individual</h4>
            </div>
            <div class="card-body">
                <form id="qrForm">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="plazaSelect" class="form-label">
                                    <i class="fas fa-home"></i> Seleccionar Plaza
                                </label>
                                <select class="form-select" id="plazaSelect" required>
                                    <option value="">Seleccione una plaza...</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="customText" class="form-label">
                                    <i class="fas fa-tag"></i> Texto Personalizado (Opcional)
                                </label>
                                <input type="text" class="form-control" id="customText" 
                                       placeholder="Ej: Plaza A1 - Entrada Principal">
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="qrSize" class="form-label">
                                    <i class="fas fa-expand-arrows-alt"></i> Tamaño del QR
                                </label>
                                <select class="form-select" id="qrSize">
                                    <option value="200">Pequeño (200x200)</option>
                                    <option value="300" selected>Mediano (300x300)</option>
                                    <option value="400">Grande (400x400)</option>
                                    <option value="500">Muy Grande (500x500)</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="mb-3">
                                <label for="qrColor" class="form-label">
                                    <i class="fas fa-palette"></i> Color del QR
                                </label>
                                <select class="form-select" id="qrColor">
                                    <option value="#000000">Negro</option>
                                    <option value="#667eea">Azul</option>
                                    <option value="#28a745">Verde</option>
                                    <option value="#dc3545">Rojo</option>
                                    <option value="#6f42c1">Morado</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-qrcode"></i> Generar QR
                        </button>
                        <button type="button" class="btn btn-secondary ms-2" id="generateAllBtn">
                            <i class="fas fa-layer-group"></i> Generar Todos los QR
                        </button>
                    </div>
                </form>
                
                <div id="alertContainer"></div>
                
                <div id="qrResult" class="qr-container" style="display: none;">
                    <h5><i class="fas fa-qrcode"></i> Código QR Generado</h5>
                    <div id="qrcode"></div>
                    <div class="qr-info">
                        <h5>Información del QR</h5>
                        <p><strong>Plaza:</strong> <span id="qrPlazaName"></span></p>
                        <p><strong>Dirección:</strong> <span id="qrPlazaAddress"></span></p>
                        <p><strong>Token:</strong> <span id="qrPlazaToken"></span></p>
                        <p><strong>URL:</strong> <span id="qrPlazaUrl"></span></p>
                    </div>
                    <div class="mt-3">
                        <button class="btn btn-primary" onclick="downloadQR()">
                            <i class="fas fa-download"></i> Descargar QR
                        </button>
                        <button class="btn btn-secondary" onclick="printQR()">
                            <i class="fas fa-print"></i> Imprimir QR
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Generador Masivo -->
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0"><i class="fas fa-layer-group"></i> Códigos QR de Todas las Plazas</h4>
            </div>
            <div class="card-body">
                <div id="loadingAll" class="loading" style="display: none;">
                    <div class="spinner-border" role="status"></div>
                    <p class="mt-3">Generando códigos QR para todas las plazas...</p>
                </div>
                <div id="allQRContainer" class="plaza-grid"></div>
            </div>
        </div>
    </div>
    
    <script>
        let plazasData = [];
        let currentQRData = null;
        
        // Función para obtener la URL base de la API
        function getApiUrl() {
            return window.location.origin;
        }
        
        // Función de debugging
        function debug(message, data = null) {
            console.log(`[QR Debug] ${message}`, data);
        }
        
        // Cargar plazas al iniciar
        document.addEventListener('DOMContentLoaded', function() {
            debug('Documento cargado, iniciando...');
            
            // Cargar plazas inmediatamente
            loadPlazas();
            
            // Verificar disponibilidad de QRCode con timeout
            setTimeout(() => {
                checkQRCodeAvailability();
            }, 2000);
        });
        
        // Verificar disponibilidad de QRCode library
        function checkQRCodeAvailability() {
            if (typeof QRCode !== 'undefined' && QRCode.toCanvas) {
                debug('QRCode library disponible y funcional');
                showAlert('success', 'Generador QR externo disponible - Funcionalidad completa');
            } else {
                debug('QRCode library no disponible, usando implementación local mejorada');
                showAlert('info', 'Usando generador QR local mejorado - Códigos QR funcionales');
            }
        }
        
        // Cargar plazas desde la API
        async function loadPlazas() {
            debug('Cargando plazas desde API...');
            
            try {
                const apiUrl = `${getApiUrl()}/api/plazas`;
                debug('URL API:', apiUrl);
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    }
                });
                
                debug('Response status:', response.status);
                debug('Response headers:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                debug('Datos recibidos:', data);
                
                if (!data || (!data.plazas && !Array.isArray(data))) {
                    debug('Intentando interpretar datos como array directo...');
                    if (Array.isArray(data)) {
                        plazasData = data;
                    } else {
                        throw new Error('Formato de datos inválido');
                    }
                } else {
                    plazasData = data.plazas || data;
                }
                
                debug('Plazas cargadas:', plazasData.length);
                
                populateSelectOptions();
                
                if (plazasData.length > 0) {
                    showAlert('success', `${plazasData.length} plazas cargadas correctamente`);
                } else {
                    showAlert('warning', 'No se encontraron plazas disponibles');
                }
                
            } catch (error) {
                debug('Error cargando plazas:', error);
                showAlert('danger', 'Error al cargar las plazas: ' + error.message);
                
                // Intentar con datos de prueba si la API falla
                debug('Intentando con datos de prueba...');
                plazasData = [
                    { id: 1, nombre: 'Plaza A1', direccion: 'Calle Principal 123', token: 'test-token-1' },
                    { id: 2, nombre: 'Plaza A2', direccion: 'Calle Principal 124', token: 'test-token-2' },
                    { id: 3, nombre: 'Plaza B1', direccion: 'Calle Secundaria 125', token: 'test-token-3' }
                ];
                
                populateSelectOptions();
                showAlert('info', 'Usando datos de prueba. Verifique la conexión con el servidor.');
            }
        }
        
        // Poblar opciones del select
        function populateSelectOptions() {
            const select = document.getElementById('plazaSelect');
            select.innerHTML = '<option value="">Seleccione una plaza...</option>';
            
            plazasData.forEach(plaza => {
                const option = document.createElement('option');
                option.value = plaza.id;
                option.textContent = `${plaza.nombre} - ${plaza.direccion}`;
                select.appendChild(option);
            });
            
            debug('Select poblado con opciones:', select.options.length);
        }
        
        // Manejar envío del formulario
        document.getElementById('qrForm').addEventListener('submit', function(e) {
            e.preventDefault();
            debug('Formulario enviado');
            generateSingleQR();
        });
        
        // Generar QR individual
        function generateSingleQR() {
            debug('Generando QR individual...');
            
            const plazaId = document.getElementById('plazaSelect').value;
            const customText = document.getElementById('customText').value;
            const qrSize = parseInt(document.getElementById('qrSize').value);
            const qrColor = document.getElementById('qrColor').value;
            
            debug('Parámetros:', { plazaId, customText, qrSize, qrColor });
            
            if (!plazaId) {
                debug('Error: No se seleccionó plaza');
                showAlert('danger', 'Por favor seleccione una plaza');
                return;
            }
            
            const plaza = plazasData.find(p => p.id == plazaId);
            if (!plaza) {
                debug('Error: Plaza no encontrada en datos');
                showAlert('danger', 'Plaza no encontrada');
                return;
            }
            
            debug('Plaza encontrada:', plaza);
            generateQRCode(plaza, customText, qrSize, qrColor);
        }
        
        // Generar código QR
        async function generateQRCode(plaza, customText = '', size = 300, color = '#000000') {
            debug('Generando QR para plaza:', plaza);
            
            try {
                // Crear URL para el QR
                const qrUrl = `${getApiUrl()}/checkin.html?plaza=${plaza.token || plaza.id}`;
                debug('URL generada:', qrUrl);
                
                // Limpiar contenedor anterior
                const qrContainer = document.getElementById('qrcode');
                qrContainer.innerHTML = '';
                
                debug('Parámetros QR:', { size, color, url: qrUrl });
                
                // Generar QR usando función universal
                const canvas = await generateQRCanvas(qrUrl, size, color);
                qrContainer.appendChild(canvas);
                
                debug('QR generado exitosamente');
                
                // Mostrar resultado
                document.getElementById('qrResult').style.display = 'block';
                
                // Actualizar información
                document.getElementById('qrPlazaName').textContent = customText || plaza.nombre;
                document.getElementById('qrPlazaAddress').textContent = plaza.direccion || 'N/A';
                document.getElementById('qrPlazaToken').textContent = plaza.token || plaza.id;
                document.getElementById('qrPlazaUrl').textContent = qrUrl;
                
                // Guardar datos actuales
                currentQRData = {
                    plaza: plaza,
                    customText: customText,
                    url: qrUrl,
                    size: size,
                    color: color
                };
                
                showAlert('success', 'Código QR generado exitosamente');
                
                // Scroll hacia el resultado
                setTimeout(() => {
                    document.getElementById('qrResult').scrollIntoView({ behavior: 'smooth' });
                }, 100);
                
            } catch (error) {
                debug('Error en generateQRCode:', error);
                showAlert('danger', 'Error al generar QR: ' + error.message);
            }
        }
        
        // Generar todos los QR
        document.getElementById('generateAllBtn').addEventListener('click', function() {
            debug('Botón "Generar Todos" clickeado');
            generateAllQRs();
        });
        
        // Generar QR para todas las plazas
        async function generateAllQRs() {
            debug('Generando QRs para todas las plazas...');
            
            if (plazasData.length === 0) {
                debug('No hay plazas disponibles');
                showAlert('danger', 'No hay plazas disponibles. Intente recargar la página.');
                return;
            }
            
            const container = document.getElementById('allQRContainer');
            const loading = document.getElementById('loadingAll');
            
            // Mostrar loading
            loading.style.display = 'block';
            container.innerHTML = '';
            
            debug(`Generando ${plazasData.length} QRs...`);
            
            try {
                let generatedCount = 0;
                
                for (const plaza of plazasData) {
                    debug(`Generando QR para: ${plaza.nombre}`);
                    await generateQRForPlaza(plaza, container);
                    generatedCount++;
                    
                    // Pequeña pausa para no sobrecargar
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                debug(`${generatedCount} QRs generados exitosamente`);
                showAlert('success', `${generatedCount} códigos QR generados exitosamente`);
                
            } catch (error) {
                debug('Error generando QRs:', error);
                showAlert('danger', 'Error al generar los códigos QR: ' + error.message);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // Generar QR para una plaza específica
        async function generateQRForPlaza(plaza, container) {
            try {
                const qrUrl = `${getApiUrl()}/checkin.html?plaza=${plaza.token || plaza.id}`;
                debug(`Generando QR para plaza ${plaza.nombre}, URL: ${qrUrl}`);
                
                // Crear elemento del QR
                const plazaCard = document.createElement('div');
                plazaCard.className = 'plaza-card';
                plazaCard.id = `plaza-card-${plaza.id}`;
                
                plazaCard.innerHTML = `
                    <h6>${plaza.nombre}</h6>
                    <p class="text-muted">${plaza.direccion || 'Dirección no disponible'}</p>
                    <div class="qr-code-container"></div>
                    <div class="mt-3">
                        <button class="btn btn-sm btn-primary" onclick="downloadPlazaQR('${plaza.id}')">
                            <i class="fas fa-download"></i> Descargar
                        </button>
                    </div>
                `;
                
                const qrContainer = plazaCard.querySelector('.qr-code-container');
                
                // Generar QR usando función universal
                const canvas = await generateQRCanvas(qrUrl, 200, '#000000');
                qrContainer.appendChild(canvas);
                
                debug(`QR generado exitosamente para ${plaza.nombre}`);
                container.appendChild(plazaCard);
                
            } catch (error) {
                debug(`Error en generateQRForPlaza para ${plaza.nombre}:`, error);
                throw error;
            }
        }
        
        // Descargar QR individual
        function downloadQR() {
            if (!currentQRData) {
                showAlert('danger', 'No hay QR para descargar');
                return;
            }
            
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                showAlert('danger', 'Error: No se encontró el código QR');
                return;
            }
            
            // Crear enlace de descarga
            const link = document.createElement('a');
            link.download = `QR_${currentQRData.plaza.nombre.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Descargar QR de plaza específica
        function downloadPlazaQR(plazaId) {
            const plaza = plazasData.find(p => p.id == plazaId);
            if (!plaza) return;
            
            const plazaCard = document.querySelector(`[onclick="downloadPlazaQR('${plazaId}')"]`).closest('.plaza-card');
            const canvas = plazaCard.querySelector('canvas');
            
            if (!canvas) {
                showAlert('danger', 'Error: No se encontró el código QR');
                return;
            }
            
            const link = document.createElement('a');
            link.download = `QR_${plaza.nombre.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
            link.href = canvas.toDataURL();
            link.click();
        }
        
        // Imprimir QR
        function printQR() {
            if (!currentQRData) {
                showAlert('danger', 'No hay QR para imprimir');
                return;
            }
            
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                showAlert('danger', 'Error: No se encontró el código QR');
                return;
            }
            
            const printWindow = window.open('', '', 'width=600,height=600');
            printWindow.document.write(`
                <html>
                <head>
                    <title>QR ${currentQRData.plaza.nombre}</title>
                    <style>
                        body { 
                            font-family: Arial, sans-serif; 
                            text-align: center; 
                            padding: 20px;
                        }
                        .qr-info {
                            margin: 20px 0;
                        }
                        .qr-info h2 {
                            color: #333;
                            margin-bottom: 10px;
                        }
                        .qr-info p {
                            color: #666;
                            margin: 5px 0;
                        }
                        img {
                            border: 2px solid #ddd;
                            padding: 10px;
                            background: white;
                        }
                    </style>
                </head>
                <body>
                    <div class="qr-info">
                        <h2>${currentQRData.customText || currentQRData.plaza.nombre}</h2>
                        <p><strong>Dirección:</strong> ${currentQRData.plaza.direccion}</p>
                        <p><strong>Token:</strong> ${currentQRData.plaza.token || currentQRData.plaza.id}</p>
                    </div>
                    <img src="${canvas.toDataURL()}" alt="QR Code">
                    <div class="qr-info">
                        <p><strong>URL:</strong> ${currentQRData.url}</p>
                        <p><em>Escanea este código QR para acceder al check-in</em></p>
                    </div>
                </body>
                </html>
            `);
            
            printWindow.document.close();
            printWindow.print();
        }
        
        // Mostrar alertas
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show mt-3`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            container.innerHTML = '';
            container.appendChild(alert);
            
            // Auto-dismiss después de 5 segundos
            setTimeout(() => {
                if (alert && alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }
    </script>
    
    <script>
        // Implementación mejorada del algoritmo QR que genera códigos funcionales
        class LocalQRGenerator {
            constructor() {
                this.modules = [];
                this.size = 21; // QR Version 1 es 21x21
                this.errorCorrectionLevel = 'M';
            }
            
            // Generar QR Code funcional
            generate(text, size = 300) {
                try {
                    // Reinicializar matriz
                    this.modules = [];
                    this.size = 21;
                    
                    // Inicializar matriz 21x21 con false
                    for (let i = 0; i < this.size; i++) {
                        this.modules[i] = new Array(this.size).fill(false);
                    }
                    
                    // Aplicar elementos del QR Code
                    this.addFinderPatterns();
                    this.addSeparators();
                    this.addTimingPatterns();
                    this.addDarkModule();
                    this.addFormatInfo();
                    this.addDataAndErrorCorrection(text);
                    
                    // Renderizar en canvas
                    return this.renderCanvas(size);
                } catch (error) {
                    console.error('Error generando QR local:', error);
                    throw error;
                }
            }
            
            // Agregar patrones de búsqueda (finder patterns)
            addFinderPatterns() {
                const positions = [[0, 0], [0, 14], [14, 0]];
                
                positions.forEach(([row, col]) => {
                    // Patrón 7x7
                    for (let r = 0; r < 7; r++) {
                        for (let c = 0; c < 7; c++) {
                            const isEdge = r === 0 || r === 6 || c === 0 || c === 6;
                            const isCenter = r >= 2 && r <= 4 && c >= 2 && c <= 4;
                            
                            if (isEdge || isCenter) {
                                this.setModule(row + r, col + c, true);
                            }
                        }
                    }
                });
            }
            
            // Agregar separadores
            addSeparators() {
                // Separadores alrededor de los finder patterns
                const positions = [
                    {row: 0, col: 0, width: 8, height: 8},
                    {row: 0, col: 13, width: 8, height: 8},
                    {row: 13, col: 0, width: 8, height: 8}
                ];
                
                positions.forEach(pos => {
                    for (let r = 0; r < pos.height; r++) {
                        for (let c = 0; c < pos.width; c++) {
                            const actualRow = pos.row + r;
                            const actualCol = pos.col + c;
                            
                            if (actualRow < this.size && actualCol < this.size) {
                                // Solo marcar como separador si no es parte del finder pattern
                                if (!this.isFinderPattern(actualRow, actualCol)) {
                                    this.setModule(actualRow, actualCol, false);
                                }
                            }
                        }
                    }
                });
            }
            
            // Verificar si una posición es parte del finder pattern
            isFinderPattern(row, col) {
                const patterns = [
                    {row: 0, col: 0}, {row: 0, col: 14}, {row: 14, col: 0}
                ];
                
                return patterns.some(pattern => {
                    return row >= pattern.row && row < pattern.row + 7 &&
                           col >= pattern.col && col < pattern.col + 7;
                });
            }
            
            // Agregar patrones de timing
            addTimingPatterns() {
                for (let i = 8; i < 13; i++) {
                    this.setModule(6, i, i % 2 === 0);
                    this.setModule(i, 6, i % 2 === 0);
                }
            }
            
            // Agregar módulo oscuro
            addDarkModule() {
                this.setModule(4 * 1 + 9, 8, true);
            }
            
            // Agregar información de formato
            addFormatInfo() {
                // Información de formato simplificada para nivel M
                const formatBits = '101010000010010'; // 15 bits para formato
                
                // Colocar bits de formato
                for (let i = 0; i < 15; i++) {
                    const bit = formatBits[i] === '1';
                    
                    if (i < 6) {
                        this.setModule(8, i, bit);
                    } else if (i === 6) {
                        this.setModule(8, 7, bit);
                    } else if (i === 7) {
                        this.setModule(8, 8, bit);
                    } else if (i === 8) {
                        this.setModule(7, 8, bit);
                    } else {
                        this.setModule(14 - i, 8, bit);
                    }
                }
                
                // Información de formato en el lado derecho/abajo
                for (let i = 0; i < 15; i++) {
                    const bit = formatBits[i] === '1';
                    
                    if (i < 8) {
                        this.setModule(this.size - 1 - i, 8, bit);
                    } else {
                        this.setModule(8, this.size - 15 + i, bit);
                    }
                }
            }
            
            // Agregar datos y corrección de errores
            addDataAndErrorCorrection(text) {
                // Codificar texto a datos binarios (simplificado)
                const encodedData = this.encodeData(text);
                
                // Aplicar máscara y colocar datos
                this.placeData(encodedData);
            }
            
            // Codificar datos
            encodeData(text) {
                // Modo alfanumérico simplificado
                let data = '';
                
                // Agregar indicador de modo (0010 para alfanumérico)
                data += '0010';
                
                // Agregar longitud de caracteres
                const length = text.length;
                data += length.toString(2).padStart(9, '0');
                
                // Codificar caracteres
                for (let i = 0; i < text.length; i++) {
                    const char = text.charCodeAt(i);
                    data += char.toString(2).padStart(8, '0');
                }
                
                // Agregar terminador
                data += '0000';
                
                // Rellenar hasta completar capacidad
                while (data.length < 152) { // Capacidad para versión 1 nivel M
                    data += '11101100'; // Padding pattern
                    if (data.length < 152) {
                        data += '00010001';
                    }
                }
                
                return data.substring(0, 152);
            }
            
            // Colocar datos en la matriz
            placeData(data) {
                let bitIndex = 0;
                let up = true;
                
                // Recorrer de derecha a izquierda en zigzag
                for (let col = this.size - 1; col > 0; col -= 2) {
                    if (col === 6) col--; // Saltar columna de timing
                    
                    for (let count = 0; count < this.size; count++) {
                        const row = up ? this.size - 1 - count : count;
                        
                        for (let c = 0; c < 2; c++) {
                            const actualCol = col - c;
                            
                            if (!this.isReserved(row, actualCol) && bitIndex < data.length) {
                                const bit = data[bitIndex++] === '1';
                                // Aplicar máscara (patrón 0: (row + col) % 2 === 0)
                                const mask = (row + actualCol) % 2 === 0;
                                this.setModule(row, actualCol, bit !== mask);
                            }
                        }
                    }
                    
                    up = !up;
                }
            }
            
            // Verificar si una posición está reservada
            isReserved(row, col) {
                // Finder patterns
                if (this.isFinderPattern(row, col)) return true;
                
                // Separadores
                if ((row < 9 && col < 9) || 
                    (row < 9 && col >= 12) || 
                    (row >= 12 && col < 9)) return true;
                
                // Timing patterns
                if (row === 6 || col === 6) return true;
                
                // Formato
                if ((row === 8 && col < 9) || (row === 8 && col >= 12)) return true;
                if ((col === 8 && row < 9) || (col === 8 && row >= 12)) return true;
                
                // Módulo oscuro
                if (row === 4 * 1 + 9 && col === 8) return true;
                
                return false;
            }
            
            // Establecer módulo
            setModule(row, col, value) {
                if (row >= 0 && row < this.size && col >= 0 && col < this.size) {
                    this.modules[row][col] = value;
                }
            }
            
            // Renderizar en canvas
            renderCanvas(size) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                const moduleSize = Math.floor(size / this.size);
                const offset = Math.floor((size - (this.size * moduleSize)) / 2);
                
                // Fondo blanco
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, size, size);
                
                // Dibujar módulos
                ctx.fillStyle = '#000000';
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        if (this.modules[row][col]) {
                            ctx.fillRect(
                                offset + col * moduleSize,
                                offset + row * moduleSize,
                                moduleSize,
                                moduleSize
                            );
                        }
                    }
                }
                
                return canvas;
            }
        }
        
        // Instancia global del generador local
        const localQR = new LocalQRGenerator();
        
        // Función para usar QRCode library o implementación local mejorada
        function generateQRCanvas(text, size = 300, color = '#000000') {
            return new Promise((resolve, reject) => {
                // Intentar con QRCode library primero
                if (typeof QRCode !== 'undefined') {
                    try {
                        const canvas = document.createElement('canvas');
                        QRCode.toCanvas(canvas, text, {
                            width: size,
                            height: size,
                            margin: 2,
                            color: {
                                dark: color,
                                light: '#FFFFFF'
                            },
                            errorCorrectionLevel: 'M'
                        }, function(error) {
                            if (error) {
                                console.warn('QRCode library falló, usando implementación local:', error);
                                // Fallar a implementación local
                                tryLocalGeneration();
                            } else {
                                resolve(canvas);
                            }
                        });
                    } catch (error) {
                        console.warn('Error con QRCode library, usando implementación local:', error);
                        tryLocalGeneration();
                    }
                } else {
                    // Usar implementación local directamente
                    tryLocalGeneration();
                }
                
                function tryLocalGeneration() {
                    try {
                        // Generar QR usando implementación local mejorada
                        const canvas = localQR.generate(text, size);
                        
                        // Aplicar color personalizado si no es negro
                        if (color !== '#000000') {
                            const ctx = canvas.getContext('2d');
                            const imageData = ctx.getImageData(0, 0, size, size);
                            const data = imageData.data;
                            
                            // Convertir color hex a RGB
                            const r = parseInt(color.substr(1, 2), 16);
                            const g = parseInt(color.substr(3, 2), 16);
                            const b = parseInt(color.substr(5, 2), 16);
                            
                            // Cambiar píxeles negros al color deseado
                            for (let i = 0; i < data.length; i += 4) {
                                if (data[i] === 0 && data[i + 1] === 0 && data[i + 2] === 0) {
                                    data[i] = r;     // Red
                                    data[i + 1] = g; // Green
                                    data[i + 2] = b; // Blue
                                }
                            }
                            
                            ctx.putImageData(imageData, 0, 0);
                        }
                        
                        resolve(canvas);
                    } catch (localError) {
                        console.error('Error en implementación local:', localError);
                        reject(new Error('No se pudo generar el código QR con ningún método disponible'));
                    }
                }
            });
        }
    </script>
