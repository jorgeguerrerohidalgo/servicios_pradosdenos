<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corrección de Duplicados - Los Prados de Nos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-main {
            padding: 30px 0;
        }
        .main-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 50px;
            text-decoration: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.3);
            color: white;
            transform: scale(1.05);
        }
        .header-section {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .action-btn {
            margin: 10px 5px;
            padding: 12px 25px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .results-section {
            max-height: 400px;
            overflow-y: auto;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }
        .log-entry {
            background: white;
            border-left: 4px solid #007bff;
            padding: 10px 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 0.9em;
        }
        .log-success {
            border-left-color: #28a745;
        }
        .log-warning {
            border-left-color: #ffc107;
        }
        .log-error {
            border-left-color: #dc3545;
        }
        .table-responsive {
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <a href="admin-panel.html" class="back-btn">
        <i class="fas fa-arrow-left"></i> Volver al Panel
    </a>

    <div class="container container-main">
        <div class="header-section">
            <h1><i class="fas fa-tools"></i> Corrección de Duplicados</h1>
            <p class="lead">Herramientas para identificar y corregir plazas duplicadas</p>
        </div>

        <div class="main-card">
            <div class="row">
                <div class="col-md-6">
                    <h5><i class="fas fa-search"></i> Diagnóstico</h5>
                    <button class="btn btn-info action-btn" onclick="verificarDuplicados()">
                        <i class="fas fa-search"></i> Verificar Duplicados
                    </button>
                    <button class="btn btn-secondary action-btn" onclick="listarPlazas()">
                        <i class="fas fa-list"></i> Listar Todas las Plazas
                    </button>
                </div>
                <div class="col-md-6">
                    <h5><i class="fas fa-tools"></i> Corrección</h5>
                    <button class="btn btn-warning action-btn" onclick="eliminarDuplicados()">
                        <i class="fas fa-trash-alt"></i> Eliminar Duplicados
                    </button>
                    <button class="btn btn-success action-btn" onclick="verificarCorreccion()">
                        <i class="fas fa-check"></i> Verificar Corrección
                    </button>
                </div>
            </div>

            <div id="resultadosSection" class="results-section" style="display: none;">
                <h6><i class="fas fa-terminal"></i> Resultados:</h6>
                <div id="logContainer"></div>
            </div>
        </div>

        <div class="main-card" id="tablaSection" style="display: none;">
            <h5><i class="fas fa-table"></i> Datos de Plazas</h5>
            <div class="table-responsive">
                <table class="table table-striped" id="plazasTable">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Dirección</th>
                            <th>Token QR</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="plazasTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function log(message, type = 'info') {
            const logContainer = document.getElementById('logContainer');
            const resultadosSection = document.getElementById('resultadosSection');
            
            resultadosSection.style.display = 'block';
            
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerHTML = `<strong>[${new Date().toLocaleTimeString()}]</strong> ${message}`;
            
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog() {
            const logContainer = document.getElementById('logContainer');
            logContainer.innerHTML = '';
        }

        async function verificarDuplicados() {
            clearLog();
            log('🔍 Verificando plazas duplicadas...', 'info');

            try {
                const response = await fetch('/api/admin/check-duplicates', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    if (data.duplicados && data.duplicados.length > 0) {
                        log(`⚠️ Se encontraron ${data.duplicados.length} grupos de plazas duplicadas:`, 'warning');
                        data.duplicados.forEach(dup => {
                            log(`   - "${dup.nombre}": ${dup.cantidad} ocurrencias`, 'warning');
                        });
                        log('💡 Usa el botón "Eliminar Duplicados" para corregir esto.', 'info');
                    } else {
                        log('✅ No se encontraron plazas duplicadas', 'success');
                    }
                    
                    log(`📊 Total de plazas: ${data.totalPlazas}`, 'info');
                } else {
                    log(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error verificando duplicados: ${error.message}`, 'error');
            }
        }

        async function listarPlazas() {
            clearLog();
            log('📋 Cargando lista de plazas...', 'info');

            try {
                const response = await fetch('/api/plazas', {
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                let plazas = [];
                if (data.success && data.plazas) {
                    plazas = data.plazas;
                } else if (Array.isArray(data)) {
                    plazas = data;
                }

                log(`✅ Cargadas ${plazas.length} plazas`, 'success');

                // Mostrar tabla
                const tablaSection = document.getElementById('tablaSection');
                const tableBody = document.getElementById('plazasTableBody');
                
                tableBody.innerHTML = '';
                
                plazas.forEach(plaza => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${plaza.id}</td>
                        <td>${plaza.nombre}</td>
                        <td>${plaza.direccion || 'N/A'}</td>
                        <td>${plaza.token ? plaza.token.substring(0, 20) + '...' : 'Sin token'}</td>
                        <td>
                            <span class="badge ${plaza.activo ? 'bg-success' : 'bg-secondary'}">
                                ${plaza.activo ? 'Activo' : 'Inactivo'}
                            </span>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });

                tablaSection.style.display = 'block';

                // Buscar duplicados manualmente
                const nombres = plazas.map(p => p.nombre);
                const duplicados = nombres.filter((nombre, index) => nombres.indexOf(nombre) !== index);
                
                if (duplicados.length > 0) {
                    log(`⚠️ Duplicados encontrados: ${[...new Set(duplicados)].join(', ')}`, 'warning');
                } else {
                    log('✅ No hay duplicados en la lista actual', 'success');
                }

            } catch (error) {
                log(`❌ Error cargando plazas: ${error.message}`, 'error');
            }
        }

        async function eliminarDuplicados() {
            if (!confirm('¿Estás seguro de que quieres eliminar las plazas duplicadas?\n\nEsta acción conservará solo la primera ocurrencia de cada plaza duplicada.')) {
                return;
            }

            clearLog();
            log('🗑️ Eliminando plazas duplicadas...', 'warning');

            try {
                const response = await fetch('/api/admin/fix-duplicates', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include'
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success) {
                    log('✅ Duplicados eliminados exitosamente', 'success');
                    
                    if (data.eliminados > 0) {
                        log(`📊 Plazas eliminadas: ${data.eliminados}`, 'info');
                        log(`📊 Tokens QR afectados: ${data.tokensEliminados || 0}`, 'info');
                        log(`📊 Check-ins movidos: ${data.checkinsAfectados || 0}`, 'info');
                    } else {
                        log('📊 No había duplicados para eliminar', 'info');
                    }
                    
                    log('💡 Ejecuta "Verificar Corrección" para confirmar', 'info');
                } else {
                    log(`❌ Error: ${data.message}`, 'error');
                }
            } catch (error) {
                log(`❌ Error eliminando duplicados: ${error.message}`, 'error');
            }
        }

        async function verificarCorreccion() {
            clearLog();
            log('✅ Verificando que la corrección fue exitosa...', 'info');

            // Verificar duplicados nuevamente
            await verificarDuplicados();
            
            // Listar plazas actualizadas
            setTimeout(() => {
                log('📋 Cargando lista actualizada...', 'info');
                listarPlazas();
            }, 1000);
        }

        // Verificar duplicados automáticamente al cargar la página
        document.addEventListener('DOMContentLoaded', function() {
            log('🔧 Herramienta de corrección de duplicados cargada', 'info');
            setTimeout(verificarDuplicados, 500);
        });
    </script>
</body>
</html>
