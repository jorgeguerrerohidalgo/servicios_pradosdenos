<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug - Servidor y Tokens</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #00ff00;
        }
        .container {
            background: #2d2d2d;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff00;
        }
        h1 {
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #444;
            border-radius: 5px;
        }
        .test-section h3 {
            color: #ffff00;
            margin-top: 0;
        }
        .btn {
            padding: 10px 20px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            min-height: 50px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .result.success {
            background: #1a4d1a;
            border: 1px solid #00ff00;
        }
        .result.error {
            background: #4d1a1a;
            border: 1px solid #ff0000;
            color: #ff6666;
        }
        .result.info {
            background: #1a1a4d;
            border: 1px solid #6666ff;
            color: #66b3ff;
        }
        .navigation {
            text-align: center;
            margin-top: 30px;
        }
        .navigation a {
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            background: #444;
            color: #00ff00;
            text-decoration: none;
            border-radius: 5px;
        }
        .navigation a:hover {
            background: #555;
        }
        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .status-online {
            background: #00ff00;
            box-shadow: 0 0 5px #00ff00;
        }
        .status-offline {
            background: #ff0000;
            box-shadow: 0 0 5px #ff0000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 DEBUG - Sistema de Tokens QR</h1>
        
        <div class="test-section">
            <h3>1. Estado del Servidor</h3>
            <button class="btn btn-primary" onclick="testServer()">Probar Conexión</button>
            <div id="serverResult" class="result info">Esperando prueba...</div>
        </div>
        
        <div class="test-section">
            <h3>2. API de Plazas</h3>
            <button class="btn btn-primary" onclick="testPlazas()">Obtener Plazas</button>
            <div id="plazasResult" class="result info">Esperando prueba...</div>
        </div>
        
        <div class="test-section">
            <h3>3. Endpoint de Tokens</h3>
            <button class="btn btn-success" onclick="testTokenGeneration()">Generar Tokens</button>
            <div id="tokensResult" class="result info">Esperando prueba...</div>
        </div>
        
        <div class="test-section">
            <h3>4. Pruebas Completas</h3>
            <button class="btn btn-primary" onclick="runAllTests()">Ejecutar Todas las Pruebas</button>
            <div id="allTestsResult" class="result info">Esperando prueba...</div>
        </div>
        
        <div class="navigation">
            <a href="setup-tokens.html">Setup Tokens</a>
            <a href="qr-plazas.html">Generar QR</a>
            <a href="admin-panel.html">Panel Admin</a>
        </div>
    </div>

    <script>
        function updateStatus(elementId, message, type = 'info') {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = `result ${type}`;
        }

        async function testServer() {
            updateStatus('serverResult', '🔄 Probando conexión con servidor...', 'info');
            
            try {
                const startTime = Date.now();
                const response = await fetch('/api/plazas');
                const endTime = Date.now();
                
                if (response.ok) {
                    updateStatus('serverResult', 
                        `✅ SERVIDOR ONLINE\n` +
                        `Status: ${response.status}\n` +
                        `Tiempo de respuesta: ${endTime - startTime}ms\n` +
                        `URL: ${response.url}`, 'success');
                } else {
                    updateStatus('serverResult', 
                        `❌ SERVIDOR RESPONDE CON ERROR\n` +
                        `Status: ${response.status}\n` +
                        `StatusText: ${response.statusText}`, 'error');
                }
            } catch (error) {
                updateStatus('serverResult', 
                    `❌ SERVIDOR NO RESPONDE\n` +
                    `Error: ${error.message}\n` +
                    `Tipo: ${error.name}`, 'error');
            }
        }

        async function testPlazas() {
            updateStatus('plazasResult', '🔄 Obteniendo plazas...', 'info');
            
            try {
                const response = await fetch('/api/plazas');
                const data = await response.json();
                
                if (response.ok && data.success) {
                    const conToken = data.plazas.filter(p => p.token);
                    const sinToken = data.plazas.filter(p => !p.token);
                    
                    updateStatus('plazasResult', 
                        `✅ PLAZAS OBTENIDAS\n` +
                        `Total: ${data.plazas.length}\n` +
                        `Con token: ${conToken.length}\n` +
                        `Sin token: ${sinToken.length}\n` +
                        `\nPlazas sin token:\n${sinToken.map(p => `- ${p.nombre} (ID: ${p.id})`).join('\n')}`, 'success');
                } else {
                    updateStatus('plazasResult', 
                        `❌ ERROR EN API PLAZAS\n` +
                        `Status: ${response.status}\n` +
                        `Data: ${JSON.stringify(data, null, 2)}`, 'error');
                }
            } catch (error) {
                updateStatus('plazasResult', 
                    `❌ ERROR DE CONEXIÓN\n` +
                    `Error: ${error.message}`, 'error');
            }
        }

        async function testTokenGeneration() {
            updateStatus('tokensResult', '🔄 Generando tokens...', 'info');
            
            try {
                const response = await fetch('/api/generate-tokens-temp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    updateStatus('tokensResult', 
                        `✅ TOKENS GENERADOS\n` +
                        `Tokens generados: ${data.tokensGenerados}\n` +
                        `Total plazas: ${data.estadoFinal.totalPlazas}\n` +
                        `Con token: ${data.estadoFinal.plazasConToken}\n` +
                        `Sin token: ${data.estadoFinal.plazasSinToken}\n` +
                        `Errores: ${data.errores.length}\n` +
                        `\n${data.errores.length > 0 ? 'Errores:\n' + data.errores.join('\n') : 'Sin errores'}`, 'success');
                } else {
                    updateStatus('tokensResult', 
                        `❌ ERROR GENERANDO TOKENS\n` +
                        `Status: ${response.status}\n` +
                        `Message: ${data.message || 'Sin mensaje'}\n` +
                        `Error: ${data.error || 'Sin error específico'}\n` +
                        `Data: ${JSON.stringify(data, null, 2)}`, 'error');
                }
            } catch (error) {
                updateStatus('tokensResult', 
                    `❌ ERROR DE CONEXIÓN\n` +
                    `Error: ${error.message}`, 'error');
            }
        }

        async function runAllTests() {
            updateStatus('allTestsResult', '🔄 Ejecutando todas las pruebas...', 'info');
            
            const results = [];
            
            // Test 1: Servidor
            try {
                const serverResponse = await fetch('/api/plazas');
                results.push(`1. Servidor: ${serverResponse.ok ? '✅' : '❌'} (${serverResponse.status})`);
            } catch (error) {
                results.push(`1. Servidor: ❌ (${error.message})`);
            }
            
            // Test 2: Plazas
            try {
                const plazasResponse = await fetch('/api/plazas');
                const plazasData = await plazasResponse.json();
                if (plazasResponse.ok && plazasData.success) {
                    const sinToken = plazasData.plazas.filter(p => !p.token);
                    results.push(`2. Plazas: ✅ (${plazasData.plazas.length} total, ${sinToken.length} sin token)`);
                } else {
                    results.push(`2. Plazas: ❌ (Error en API)`);
                }
            } catch (error) {
                results.push(`2. Plazas: ❌ (${error.message})`);
            }
            
            // Test 3: Tokens
            try {
                const tokensResponse = await fetch('/api/generate-tokens-temp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                const tokensData = await tokensResponse.json();
                if (tokensResponse.ok && tokensData.success) {
                    results.push(`3. Tokens: ✅ (${tokensData.tokensGenerados} generados)`);
                } else {
                    results.push(`3. Tokens: ❌ (${tokensData.message || 'Error desconocido'})`);
                }
            } catch (error) {
                results.push(`3. Tokens: ❌ (${error.message})`);
            }
            
            const allPassed = results.every(r => r.includes('✅'));
            
            updateStatus('allTestsResult', 
                `${allPassed ? '✅' : '❌'} RESULTADOS COMPLETOS\n\n` +
                `${results.join('\n')}\n\n` +
                `Estado general: ${allPassed ? 'SISTEMA FUNCIONANDO' : 'PROBLEMAS DETECTADOS'}`, 
                allPassed ? 'success' : 'error');
        }

        // Ejecutar prueba básica al cargar
        window.addEventListener('load', testServer);
    </script>
</body>
</html>
