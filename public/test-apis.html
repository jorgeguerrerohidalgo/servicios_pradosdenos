<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Scripts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Prueba de Funcionalidad</h1>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Prueba API Eventos</h5>
                    </div>
                    <div class="card-body">
                        <button id="testEventos" class="btn btn-primary">Probar Eventos</button>
                        <button id="testTiposEventos" class="btn btn-secondary">Probar Tipos Eventos</button>
                        <div id="resultEventos" class="mt-3"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5>Prueba API Documentos</h5>
                    </div>
                    <div class="card-body">
                        <button id="testDocumentos" class="btn btn-primary">Probar Documentos</button>
                        <button id="testTiposDocumentos" class="btn btn-secondary">Probar Tipos Documentos</button>
                        <div id="resultDocumentos" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = '/api';

        document.getElementById('testEventos').addEventListener('click', async function() {
            try {
                const response = await fetch(`${API_BASE_URL}/eventos`);
                const data = await response.json();
                document.getElementById('resultEventos').innerHTML = `
                    <div class="alert alert-success">
                        <strong>Eventos:</strong> ${data.success ? `${data.data.length} eventos encontrados` : 'Error: ' + data.message}
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultEventos').innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        });

        document.getElementById('testTiposEventos').addEventListener('click', async function() {
            try {
                const response = await fetch(`${API_BASE_URL}/eventos/tipos`);
                const data = await response.json();
                document.getElementById('resultEventos').innerHTML = `
                    <div class="alert alert-success">
                        <strong>Tipos Eventos:</strong> ${data.success ? `${data.data.length} tipos encontrados` : 'Error: ' + data.message}
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultEventos').innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        });

        document.getElementById('testDocumentos').addEventListener('click', async function() {
            try {
                const response = await fetch(`${API_BASE_URL}/documentos`);
                const data = await response.json();
                document.getElementById('resultDocumentos').innerHTML = `
                    <div class="alert alert-success">
                        <strong>Documentos:</strong> ${data.success ? `${data.data.length} documentos encontrados` : 'Error: ' + data.message}
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultDocumentos').innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        });

        document.getElementById('testTiposDocumentos').addEventListener('click', async function() {
            try {
                const response = await fetch(`${API_BASE_URL}/documentos/tipos`);
                const data = await response.json();
                document.getElementById('resultDocumentos').innerHTML = `
                    <div class="alert alert-success">
                        <strong>Tipos Documentos:</strong> ${data.success ? `${data.data.length} tipos encontrados` : 'Error: ' + data.message}
                        <pre>${JSON.stringify(data.data, null, 2)}</pre>
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultDocumentos').innerHTML = `
                    <div class="alert alert-danger">
                        <strong>Error:</strong> ${error.message}
                    </div>
                `;
            }
        });

        // Test inicial para verificar conectividad
        window.addEventListener('load', function() {
            console.log('Página cargada, probando conectividad...');
            
            fetch('/api/admin/check')
                .then(response => response.json())
                .then(data => {
                    console.log('Conectividad OK:', data);
                })
                .catch(error => {
                    console.error('Error de conectividad:', error);
                });
        });
    </script>
</body>
</html>
