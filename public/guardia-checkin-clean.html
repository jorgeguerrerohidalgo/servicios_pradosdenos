<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check-in QR - Los Prados de Nos</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #2c3e50;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .validation-code-display {
      background: #e8f4f8;
      border: 2px solid #3498db;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      margin-bottom: 30px;
    }
    .validation-code-display h3 {
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .validation-code {
      font-size: 32px;
      font-weight: bold;
      color: #3498db;
      font-family: 'Courier New', monospace;
      letter-spacing: 3px;
    }
    #reader { 
      margin: 20px 0;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #ddd;
    }
    .status { 
      margin: 15px 0; 
      padding: 15px; 
      border-radius: 10px; 
      font-weight: 500;
      display: none;
    }
    .status.success { 
      background-color: #d4edda; 
      color: #155724; 
      border: 1px solid #c3e6cb; 
      display: block;
    }
    .status.error { 
      background-color: #f8d7da; 
      color: #721c24; 
      border: 1px solid #f5c6cb; 
      display: block;
    }
    .status.info { 
      background-color: #e2e3e5; 
      color: #383d41; 
      border: 1px solid #d6d8db; 
      display: block;
    }
    .history-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin-top: 30px;
    }
    .history-item {
      background: white;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .history-item:last-child {
      margin-bottom: 0;
    }
    .plaza-name {
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 5px;
    }
    .checkin-date {
      color: #7f8c8d;
      font-size: 14px;
    }
    .btn-logout {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(220, 53, 69, 0.9);
      border: none;
      border-radius: 50px;
      padding: 8px 16px;
      color: white;
      font-size: 14px;
    }
    .btn-logout:hover {
      background: rgba(220, 53, 69, 1);
    }
    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }
    .step {
      flex: 1;
      text-align: center;
      padding: 10px;
      background: #ecf0f1;
      border-radius: 8px;
      margin: 0 5px;
      font-size: 14px;
      color: #7f8c8d;
    }
    .step.active {
      background: #3498db;
      color: white;
    }
    .step.completed {
      background: #27ae60;
      color: white;
    }
    .validation-input {
      margin-bottom: 20px;
    }
    .validation-input input {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .validation-input input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }
    .validation-input .form-text {
      font-size: 12px;
      color: #6c757d;
    }
    .btn-success {
      background: linear-gradient(45deg, #27ae60, #2ecc71);
      border: none;
      padding: 12px 24px;
      font-weight: bold;
      font-size: 16px;
    }
    .btn-success:hover {
      background: linear-gradient(45deg, #229954, #27ae60);
    }
    .btn-success:disabled {
      background: #95a5a6;
      opacity: 0.6;
    }
    .code-match {
      color: #27ae60 !important;
      font-weight: bold;
    }
    .code-mismatch {
      color: #e74c3c !important;
      font-weight: bold;
    }
    .scanner-controls {
      text-align: center;
      margin: 20px 0;
    }
    .scanner-controls button {
      margin: 0 5px;
    }
  </style>
</head>
<body>
  <button class="btn btn-danger btn-logout" onclick="logout()">
    <i class="fas fa-sign-out-alt"></i> Salir
  </button>

  <div class="container">
    <!-- Información del guardia -->
    <div class="header">
      <h1><i class="fas fa-shield-alt"></i> Check-in QR</h1>
      <p class="text-muted">Guardia: <span id="guard-name">Cargando...</span></p>
    </div>

    <!-- Mostrar el código de validación del guardia -->
    <div class="validation-code-display" id="validation-code-display" style="display: none;">
      <h3>Tu código de validación:</h3>
      <div class="validation-code" id="guardia-validation-code">----</div>
      <p class="text-muted small">Ingresa este código después de escanear el QR</p>
    </div>

    <!-- Indicador de pasos -->
    <div class="step-indicator">
      <div class="step active" id="step-1">
        <i class="fas fa-qrcode"></i><br>Escanear QR
      </div>
      <div class="step" id="step-2">
        <i class="fas fa-key"></i><br>Código
      </div>
      <div class="step" id="step-3">
        <i class="fas fa-check"></i><br>Confirmar
      </div>
    </div>

    <!-- Lector QR -->
    <div id="reader-section">
      <div class="scanner-controls">
        <button class="btn btn-primary" onclick="startScanner()">
          <i class="fas fa-camera"></i> Iniciar Escáner
        </button>
        <button class="btn btn-secondary" onclick="stopScanner()">
          <i class="fas fa-stop"></i> Detener Escáner
        </button>
      </div>
      <div id="reader"></div>
    </div>

    <!-- Información de la plaza escaneada -->
    <div id="plaza-info" style="display: none;">
      <div class="alert alert-info">
        <h5><i class="fas fa-map-marker-alt"></i> Plaza Escaneada</h5>
        <p><strong>Nombre:</strong> <span id="plaza-name"></span></p>
        <p><strong>Ubicación:</strong> <span id="plaza-location"></span></p>
      </div>
    </div>

    <!-- Ingreso del código de validación -->
    <div id="validation-section" style="display: none;">
      <div class="validation-input">
        <label for="validation-code-input" class="form-label">
          <i class="fas fa-key"></i> Ingresa tu código de validación:
        </label>
        <input 
          type="text" 
          class="form-control" 
          id="validation-code-input" 
          placeholder="Ingresa el código"
          maxlength="8"
          oninput="validateCode()"
        >
        <div class="form-text">
          Ingresa el código que se muestra arriba para confirmar tu identidad
        </div>
      </div>
      
      <button 
        class="btn btn-success w-100" 
        id="confirm-checkin-btn" 
        onclick="confirmCheckin()" 
        disabled
      >
        <i class="fas fa-check"></i> Confirmar Check-in
      </button>
    </div>

    <!-- Mensajes de estado -->
    <div id="status-message" class="status"></div>

    <!-- Historial de check-ins -->
    <div class="history-section">
      <h5><i class="fas fa-history"></i> Historial de Check-ins</h5>
      <div id="checkin-history">
        <p class="text-muted">Cargando historial...</p>
      </div>
    </div>
  </div>

<script>
// Variables globales
let html5QrcodeScanner;
let currentGuardId = null;
let guardValidationCode = null;
let scannedPlazaId = null;
let scannedPlazaName = null;
let scannedPlazaLocation = null;
let isScanning = false;

// Inicializar la aplicación
document.addEventListener('DOMContentLoaded', function() {
  checkAuth();
  loadGuardValidationCode();
  loadCheckinHistory();
});

// Verificar autenticación
function checkAuth() {
  const guardId = localStorage.getItem('guardId');
  const guardName = localStorage.getItem('guardName');
  
  if (!guardId || !guardName) {
    window.location.href = 'guardia-login.html';
    return;
  }
  
  currentGuardId = guardId;
  document.getElementById('guard-name').textContent = guardName;
}

// Cargar el código de validación del guardia
async function loadGuardValidationCode() {
  try {
    const response = await fetch(`/api/guardias/${currentGuardId}/validation-code`);
    const data = await response.json();
    
    if (data.success) {
      guardValidationCode = data.validationCode;
      document.getElementById('guardia-validation-code').textContent = guardValidationCode;
      document.getElementById('validation-code-display').style.display = 'block';
    } else {
      showStatus('Error al cargar el código de validación', 'error');
    }
  } catch (error) {
    console.error('Error al cargar código de validación:', error);
    showStatus('Error al cargar el código de validación', 'error');
  }
}

// Iniciar escáner QR
function startScanner() {
  if (isScanning) return;
  
  const config = {
    fps: 10,
    qrbox: { width: 250, height: 250 },
    aspectRatio: 1.0
  };
  
  html5QrcodeScanner = new Html5Qrcode("reader");
  
  html5QrcodeScanner.start(
    { facingMode: "environment" },
    config,
    onScanSuccess,
    onScanFailure
  ).then(() => {
    isScanning = true;
    console.log('Escáner iniciado correctamente');
  }).catch(err => {
    console.error('Error al iniciar escáner:', err);
    showStatus('Error al iniciar el escáner de QR', 'error');
  });
}

// Detener escáner QR
function stopScanner() {
  if (!isScanning || !html5QrcodeScanner) return;
  
  html5QrcodeScanner.stop().then(() => {
    isScanning = false;
    html5QrcodeScanner = null;
    console.log('Escáner detenido');
  }).catch(err => {
    console.error('Error al detener escáner:', err);
  });
}

// Éxito al escanear QR
function onScanSuccess(decodedText, decodedResult) {
  console.log('QR escaneado:', decodedText);
  
  // Detener el escáner
  stopScanner();
  
  // Procesar el QR
  processQR(decodedText);
}

// Error al escanear QR
function onScanFailure(error) {
  // No mostrar errores de escaneo continuo
}

// Procesar QR escaneado
async function processQR(qrData) {
  try {
    // Validar el formato del QR
    if (!qrData.startsWith('PLAZA-')) {
      showStatus('QR inválido. Debe ser un código de plaza.', 'error');
      return;
    }
    
    // Extraer ID de la plaza
    const plazaId = qrData.replace('PLAZA-', '');
    
    // Verificar plaza en el backend
    const response = await fetch(`/api/plazas/${plazaId}/verify`);
    const data = await response.json();
    
    if (data.success) {
      scannedPlazaId = plazaId;
      scannedPlazaName = data.plaza.nombre;
      scannedPlazaLocation = data.plaza.ubicacion;
      
      // Mostrar información de la plaza
      document.getElementById('plaza-name').textContent = scannedPlazaName;
      document.getElementById('plaza-location').textContent = scannedPlazaLocation;
      document.getElementById('plaza-info').style.display = 'block';
      
      // Mostrar sección de validación
      document.getElementById('validation-section').style.display = 'block';
      
      // Actualizar indicador de pasos
      updateStepIndicator(2);
      
      // Enfocar el campo de código
      document.getElementById('validation-code-input').focus();
      
      showStatus('Plaza escaneada correctamente. Ingresa tu código de validación.', 'success');
    } else {
      showStatus('Plaza no encontrada o inválida.', 'error');
    }
  } catch (error) {
    console.error('Error al procesar QR:', error);
    showStatus('Error al procesar el código QR', 'error');
  }
}

// Validar código ingresado
function validateCode() {
  const inputCode = document.getElementById('validation-code-input').value.toUpperCase();
  const confirmBtn = document.getElementById('confirm-checkin-btn');
  
  // Verificar si coincide con el código del guardia
  if (inputCode === guardValidationCode) {
    confirmBtn.disabled = false;
    confirmBtn.classList.add('code-match');
    confirmBtn.classList.remove('code-mismatch');
    updateStepIndicator(3);
  } else {
    confirmBtn.disabled = true;
    confirmBtn.classList.remove('code-match');
    if (inputCode.length > 0) {
      confirmBtn.classList.add('code-mismatch');
    }
  }
}

// Confirmar check-in
async function confirmCheckin() {
  if (!scannedPlazaId || !guardValidationCode) {
    showStatus('Faltan datos para el check-in', 'error');
    return;
  }
  
  const inputCode = document.getElementById('validation-code-input').value.toUpperCase();
  
  if (inputCode !== guardValidationCode) {
    showStatus('Código de validación incorrecto', 'error');
    return;
  }
  
  try {
    const response = await fetch('/api/checkin', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        guardiaId: currentGuardId,
        plazaId: scannedPlazaId,
        validationCode: inputCode
      })
    });
    
    const data = await response.json();
    
    if (data.success) {
      showStatus('Check-in registrado exitosamente', 'success');
      
      // Limpiar formulario
      resetForm();
      
      // Recargar historial
      loadCheckinHistory();
      
      // Actualizar indicador de pasos
      updateStepIndicator(1);
      
    } else {
      showStatus(data.message || 'Error al registrar check-in', 'error');
    }
  } catch (error) {
    console.error('Error al confirmar check-in:', error);
    showStatus('Error al registrar check-in', 'error');
  }
}

// Resetear formulario
function resetForm() {
  // Limpiar variables
  scannedPlazaId = null;
  scannedPlazaName = null;
  scannedPlazaLocation = null;
  
  // Limpiar campos
  document.getElementById('validation-code-input').value = '';
  document.getElementById('confirm-checkin-btn').disabled = true;
  document.getElementById('confirm-checkin-btn').classList.remove('code-match', 'code-mismatch');
  
  // Ocultar secciones
  document.getElementById('plaza-info').style.display = 'none';
  document.getElementById('validation-section').style.display = 'none';
  
  // Resetear pasos
  updateStepIndicator(1);
}

// Actualizar indicador de pasos
function updateStepIndicator(activeStep) {
  const steps = document.querySelectorAll('.step');
  
  steps.forEach((step, index) => {
    step.classList.remove('active', 'completed');
    
    if (index + 1 < activeStep) {
      step.classList.add('completed');
    } else if (index + 1 === activeStep) {
      step.classList.add('active');
    }
  });
}

// Cargar historial de check-ins
async function loadCheckinHistory() {
  try {
    const response = await fetch(`/api/checkins/guardia/${currentGuardId}`);
    const data = await response.json();
    
    if (data.success) {
      displayCheckinHistory(data.checkins);
    } else {
      document.getElementById('checkin-history').innerHTML = '<p class="text-muted">No hay check-ins registrados</p>';
    }
  } catch (error) {
    console.error('Error al cargar historial:', error);
    document.getElementById('checkin-history').innerHTML = '<p class="text-muted">Error al cargar historial</p>';
  }
}

// Mostrar historial de check-ins
function displayCheckinHistory(checkins) {
  const historyContainer = document.getElementById('checkin-history');
  
  if (checkins.length === 0) {
    historyContainer.innerHTML = '<p class="text-muted">No hay check-ins registrados</p>';
    return;
  }
  
  const historyHTML = checkins.map(checkin => `
    <div class="history-item">
      <div class="plaza-name">${checkin.plaza_nombre}</div>
      <div class="checkin-date">${formatDate(checkin.fecha_checkin)}</div>
    </div>
  `).join('');
  
  historyContainer.innerHTML = historyHTML;
}

// Formatear fecha
function formatDate(dateString) {
  const date = new Date(dateString);
  return date.toLocaleString('es-CL', {
    timeZone: 'America/Santiago',
    year: 'numeric',
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

// Mostrar mensaje de estado
function showStatus(message, type) {
  const statusElement = document.getElementById('status-message');
  statusElement.textContent = message;
  statusElement.className = `status ${type}`;
  statusElement.style.display = 'block';
  
  // Ocultar después de 5 segundos
  setTimeout(() => {
    statusElement.style.display = 'none';
  }, 5000);
}

// Cerrar sesión
function logout() {
  localStorage.removeItem('guardId');
  localStorage.removeItem('guardName');
  window.location.href = 'guardia-login.html';
}

// Limpiar al salir
window.addEventListener('beforeunload', function() {
  if (isScanning && html5QrcodeScanner) {
    html5QrcodeScanner.stop();
  }
});
</script>

</body>
</html>
