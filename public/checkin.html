<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Plaza - Los Prados de Nos</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container-main {
            padding: 30px 0;
        }
        
        .header-section {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header-section h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .checkin-card {
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            padding: 40px;
            text-align: center;
        }
        
        .plaza-info {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
        }
        
        .plaza-info h4 {
            color: #495057;
            margin-bottom: 10px;
        }
        
        .plaza-info p {
            color: #6c757d;
            margin-bottom: 5px;
        }
        
        .form-control {
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            border: none;
            border-radius: 10px;
            padding: 15px 40px;
            font-weight: 600;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }
        
        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            border: 1px solid rgba(40, 167, 69, 0.3);
            color: #155724;
            border-radius: 10px;
        }
        
        .alert-danger {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #721c24;
            border-radius: 10px;
        }
        
        .alert-info {
            background: rgba(13, 202, 240, 0.1);
            border: 1px solid rgba(13, 202, 240, 0.3);
            color: #0c5460;
            border-radius: 10px;
        }
        
        .alert-warning {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid rgba(255, 193, 7, 0.3);
            color: #664d03;
            border-radius: 10px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
        
        .loading .spinner-border {
            width: 3rem;
            height: 3rem;
            color: #667eea;
        }
        
        .checkin-success {
            background: rgba(40, 167, 69, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .checkin-success h3 {
            color: #155724;
            margin-bottom: 20px;
        }
        
        .checkin-success .success-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2rem;
            }
            
            .checkin-card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container container-main">
        <div class="header-section">
            <h1><i class="fas fa-map-marker-alt"></i> Check-in Plaza</h1>
            <p class="lead">Sistema de registro para guardias de seguridad</p>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="checkin-card">
                    <!-- Loading inicial -->
                    <div id="loadingInitial" class="loading">
                        <div class="spinner-border" role="status"></div>
                        <p class="mt-3">Validando token de plaza...</p>
                    </div>
                    
                    <!-- Contenido principal -->
                    <div id="mainContent" style="display: none;">
                        <!-- Información de la plaza -->
                        <div id="plazaInfo" class="plaza-info">
                            <h4 id="plazaNombre">Cargando...</h4>
                            <p id="plazaDireccion">Dirección: Cargando...</p>
                            <p id="plazaToken">Token: Cargando...</p>
                        </div>
                        
                        <!-- Formulario de check-in -->
                        <form id="checkinForm">
                            <div class="mb-4">
                                <label for="guardiaRut" class="form-label">
                                    <i class="fas fa-id-card"></i> RUT del Guardia
                                </label>
                                <input type="text" class="form-control" id="guardiaRut" required
                                       placeholder="Ej: 12345678-9" maxlength="12">
                            </div>
                            
                            <div class="mb-4">
                                <label for="guardiaPassword" class="form-label">
                                    <i class="fas fa-lock"></i> Contraseña
                                </label>
                                <input type="password" class="form-control" id="guardiaPassword" required
                                       placeholder="Ingrese su contraseña">
                            </div>
                            
                            <div class="mb-4">
                                <label for="observaciones" class="form-label">
                                    <i class="fas fa-clipboard"></i> Observaciones (Opcional)
                                </label>
                                <textarea class="form-control" id="observaciones" rows="3"
                                          placeholder="Ingrese cualquier observación relevante"></textarea>
                            </div>
                            
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check"></i> Realizar Check-in
                            </button>
                        </form>
                        
                        <!-- Resultado del check-in -->
                        <div id="checkinResult" style="display: none;" class="checkin-success">
                            <div class="success-icon">
                                <i class="fas fa-check-circle"></i>
                            </div>
                            <h3>¡Check-in Exitoso!</h3>
                            <p><strong>Guardia:</strong> <span id="resultGuardia"></span></p>
                            <p><strong>Plaza:</strong> <span id="resultPlaza"></span></p>
                            <p><strong>Fecha y Hora:</strong> <span id="resultFecha"></span></p>
                            <p><strong>Observaciones:</strong> <span id="resultObservaciones"></span></p>
                            
                            <button class="btn btn-success mt-3" onclick="window.location.reload()">
                                <i class="fas fa-refresh"></i> Nuevo Check-in
                            </button>
                        </div>
                    </div>
                    
                    <!-- Alertas -->
                    <div id="alertContainer"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let currentPlaza = null;
        let plazaToken = null;
        
        // Función para obtener la URL base de la API
        function getApiUrl() {
            return window.location.origin;
        }
        
        // Función de debugging
        function debug(message, data = null) {
            console.log(`[Checkin Debug] ${message}`, data);
        }
        
        // Obtener parámetros de la URL
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                plaza: params.get('plaza') || params.get('token')
            };
        }
        
        // Cargar información inicial
        document.addEventListener('DOMContentLoaded', function() {
            debug('Documento cargado, iniciando...');
            
            const params = getUrlParams();
            plazaToken = params.plaza;
            
            if (!plazaToken) {
                showAlert('danger', 'Token de plaza no especificado en la URL');
                return;
            }
            
            debug('Token de plaza:', plazaToken);
            validatePlazaToken();
        });
        
        // Validar token de plaza
        async function validatePlazaToken() {
            debug('Validando token de plaza...');
            
            try {
                const response = await fetch(`${getApiUrl()}/api/plazas/validate-token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ token: plazaToken })
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                debug('Respuesta validación:', data);
                
                if (data.success && data.plaza) {
                    currentPlaza = data.plaza;
                    displayPlazaInfo();
                    showMainContent();
                } else {
                    throw new Error(data.message || 'Token inválido');
                }
                
            } catch (error) {
                debug('Error validando token:', error);
                showAlert('danger', 'Error validando token de plaza: ' + error.message);
                
                // Buscar plaza por token en lista de plazas
                await fallbackPlazaSearch();
            }
        }
        
        // Búsqueda de plaza como fallback
        async function fallbackPlazaSearch() {
            debug('Buscando plaza como fallback...');
            
            try {
                const response = await fetch(`${getApiUrl()}/api/plazas`);
                const data = await response.json();
                
                const plazas = data.plazas || data;
                const plaza = plazas.find(p => p.token === plazaToken);
                
                if (plaza) {
                    currentPlaza = plaza;
                    displayPlazaInfo();
                    showMainContent();
                } else {
                    showAlert('danger', 'Token de plaza inválido o no encontrado');
                }
                
            } catch (error) {
                debug('Error en fallback:', error);
                showAlert('danger', 'Error buscando plaza: ' + error.message);
            }
        }
        
        // Mostrar información de la plaza
        function displayPlazaInfo() {
            document.getElementById('plazaNombre').textContent = currentPlaza.nombre;
            document.getElementById('plazaDireccion').textContent = 
                `Dirección: ${currentPlaza.direccion || 'No especificada'}`;
            document.getElementById('plazaToken').textContent = 
                `Token: ${currentPlaza.token || plazaToken}`;
        }
        
        // Mostrar contenido principal
        function showMainContent() {
            document.getElementById('loadingInitial').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            // Formatear RUT automáticamente
            const rutInput = document.getElementById('guardiaRut');
            rutInput.addEventListener('input', formatRUT);
            
            // Manejar envío del formulario
            document.getElementById('checkinForm').addEventListener('submit', handleCheckin);
        }
        
        // Formatear RUT automáticamente
        function formatRUT(event) {
            let value = event.target.value.replace(/[^0-9kK]/g, '');
            
            if (value.length > 1) {
                value = value.slice(0, -1) + '-' + value.slice(-1);
            }
            
            if (value.length > 9) {
                value = value.slice(0, -2) + '.' + value.slice(-2);
            }
            
            if (value.length > 12) {
                value = value.slice(0, -3) + '.' + value.slice(-3);
            }
            
            event.target.value = value.toUpperCase();
        }
        
        // Manejar check-in
        async function handleCheckin(event) {
            event.preventDefault();
            debug('Procesando check-in...');
            
            const rut = document.getElementById('guardiaRut').value;
            const password = document.getElementById('guardiaPassword').value;
            const observaciones = document.getElementById('observaciones').value;
            
            if (!rut || !password) {
                showAlert('danger', 'Por favor complete todos los campos obligatorios');
                return;
            }
            
            try {
                const response = await fetch(`${getApiUrl()}/api/checkin`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        rut: rut,
                        password: password,
                        plaza_token: plazaToken,
                        observaciones: observaciones
                    })
                });
                
                const data = await response.json();
                debug('Respuesta check-in:', data);
                
                if (data.success) {
                    showCheckinSuccess(data);
                } else {
                    showAlert('danger', data.message || 'Error realizando check-in');
                }
                
            } catch (error) {
                debug('Error en check-in:', error);
                showAlert('danger', 'Error realizando check-in: ' + error.message);
            }
        }
        
        // Mostrar éxito del check-in
        function showCheckinSuccess(data) {
            document.getElementById('checkinForm').style.display = 'none';
            document.getElementById('checkinResult').style.display = 'block';
            
            document.getElementById('resultGuardia').textContent = data.guardia_nombre || 'N/A';
            document.getElementById('resultPlaza').textContent = currentPlaza.nombre;
            document.getElementById('resultFecha').textContent = 
                new Date().toLocaleString('es-CL', {
                    timeZone: 'America/Santiago',
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            document.getElementById('resultObservaciones').textContent = 
                data.observaciones || 'Sin observaciones';
            
            showAlert('success', 'Check-in realizado exitosamente');
        }
        
        // Mostrar alertas
        function showAlert(type, message) {
            const container = document.getElementById('alertContainer');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show mt-3`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            container.innerHTML = '';
            container.appendChild(alert);
            
            // Auto-dismiss después de 5 segundos
            setTimeout(() => {
                if (alert && alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
