<!-- ========================================
     EJEMPLO: Integración de Upload de Fotos en Modal de Mascotas
     ======================================== 
     
     Este código muestra cómo integrar el upload de fotos
     en el formulario existente de mascotas.
     
     IMPORTANTE: Este es un EJEMPLO de referencia.
     El código real está en admin-panel.html
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo - Upload Fotos Mascotas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Modal de Mascota (simplificado para ejemplo) -->
<div class="modal fade" id="mascotaModal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="mascotaModalTitle">Nueva Mascota</h5>
            </div>
            <div class="modal-body">
                <form id="mascotaForm">
                    
                    <!-- ... Otros campos del formulario ... -->
                    
                    <!-- ============================================
                         SECCIÓN DE FOTO - CÓDIGO NUEVO
                         ============================================ -->
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-camera"></i> Foto de la Mascota
                        </label>
                        
                        <!-- Preview de la foto actual -->
                        <div id="mascotaFotoPreview" class="mb-3 text-center" style="display: none;">
                            <img id="mascotaFotoImg" 
                                 src="" 
                                 alt="Foto de mascota" 
                                 class="img-thumbnail"
                                 style="max-width: 250px; max-height: 250px; border-radius: 12px;">
                            <br>
                            <button type="button" 
                                    class="btn btn-sm btn-danger mt-2" 
                                    onclick="removeMascotaFoto()">
                                <i class="fas fa-trash"></i> Eliminar foto actual
                            </button>
                        </div>
                        
                        <!-- Input para subir nueva foto -->
                        <div class="input-group">
                            <input type="file" 
                                   class="form-control" 
                                   id="mascotaFotoFile" 
                                   accept="image/jpeg,image/png,image/webp,image/gif"
                                   onchange="previewSelectedPhoto(this)">
                            <label class="input-group-text" for="mascotaFotoFile">
                                <i class="fas fa-upload"></i>
                            </label>
                        </div>
                        
                        <!-- Input oculto para guardar URL -->
                        <input type="hidden" id="mascotaFoto" name="foto_url">
                        
                        <!-- Indicador de progreso -->
                        <div id="uploadProgress" class="mt-2" style="display: none;">
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                                     style="width: 100%">
                                    Subiendo foto...
                                </div>
                            </div>
                        </div>
                        
                        <small class="form-text text-muted">
                            <i class="fas fa-info-circle"></i> 
                            Formatos: JPG, PNG, WebP, GIF. Tamaño máximo: 3 MB
                        </small>
                    </div>
                    <!-- ============================================ -->
                    
                    <!-- ... Resto de campos ... -->
                    
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success" onclick="saveMascota()">
                    <i class="fas fa-save"></i> Guardar Mascota
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/mascota-photo-upload.js"></script>

<script>
// ============================================
// FUNCIONES DE INTEGRACIÓN
// ============================================

/**
 * Preview de la foto seleccionada antes de subirla
 */
function previewSelectedPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        
        reader.onload = function(e) {
            document.getElementById('mascotaFotoImg').src = e.target.result;
            document.getElementById('mascotaFotoPreview').style.display = 'block';
        };
        
        reader.readAsDataURL(input.files[0]);
    }
}

/**
 * Mostrar foto cuando se carga una mascota existente
 */
function showMascotaFotoPreview(photoURL) {
    if (photoURL) {
        document.getElementById('mascotaFotoImg').src = photoURL;
        document.getElementById('mascotaFotoPreview').style.display = 'block';
        document.getElementById('mascotaFoto').value = photoURL;
    } else {
        document.getElementById('mascotaFotoPreview').style.display = 'none';
        document.getElementById('mascotaFoto').value = '';
    }
}

/**
 * Eliminar foto actual
 */
function removeMascotaFoto() {
    // Limpiar preview
    document.getElementById('mascotaFotoPreview').style.display = 'none';
    document.getElementById('mascotaFoto').value = '';
    document.getElementById('mascotaFotoFile').value = '';
    document.getElementById('mascotaFotoImg').src = '';
}

/**
 * Guardar mascota (modificar función existente)
 */
async function saveMascota() {
    const form = document.getElementById('mascotaForm');
    
    // Validaciones del formulario...
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    
    // Recopilar datos del formulario
    const mascotaId = document.getElementById('mascotaId').value;
    const plazaId = document.getElementById('mascotaPlaza').value;
    const casaId = document.getElementById('mascotaCasa').value;
    const nombre = document.getElementById('mascotaNombre').value;
    // ... otros campos ...
    
    let fotoURL = document.getElementById('mascotaFoto').value; // URL actual (si existe)
    
    // ============================================
    // SUBIR FOTO SI SE SELECCIONÓ UN ARCHIVO NUEVO
    // ============================================
    const fileInput = document.getElementById('mascotaFotoFile');
    if (fileInput.files.length > 0) {
        try {
            // Mostrar indicador de progreso
            document.getElementById('uploadProgress').style.display = 'block';
            
            const file = fileInput.files[0];
            
            // ID temporal para nuevas mascotas
            const effectiveMascotaId = mascotaId || `temp_${Date.now()}`;
            
            console.log('📸 Subiendo foto de mascota...');
            
            // Subir foto (reemplaza la anterior si existe)
            fotoURL = await replaceMascotaPhoto(
                file, 
                fotoURL,  // URL anterior (se eliminará)
                effectiveMascotaId, 
                casaId, 
                plazaId
            );
            
            console.log('✅ Foto subida:', fotoURL);
            
            // Ocultar indicador de progreso
            document.getElementById('uploadProgress').style.display = 'none';
            
        } catch (error) {
            console.error('Error al subir foto:', error);
            document.getElementById('uploadProgress').style.display = 'none';
            
            // Mostrar error al usuario
            Swal.fire({
                icon: 'error',
                title: 'Error al subir foto',
                text: error.message || 'No se pudo subir la imagen. Intenta nuevamente.'
            });
            
            return; // No continuar si falla la foto
        }
    }
    
    // Preparar objeto de datos
    const data = {
        nombre: nombre,
        plaza_id: parseInt(plazaId),
        casa_id: parseInt(casaId),
        foto_url: fotoURL,  // ← URL de la foto (nueva o existente)
        // ... otros campos ...
    };
    
    // Guardar en la base de datos
    try {
        const url = mascotaId 
            ? `/api/mascotas/${mascotaId}` 
            : '/api/mascotas';
        
        const method = mascotaId ? 'PUT' : 'POST';
        
        const response = await authenticatedFetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        
        if (response && response.ok) {
            const result = await response.json();
            
            Swal.fire({
                icon: 'success',
                title: '¡Éxito!',
                text: mascotaId ? 'Mascota actualizada' : 'Mascota registrada',
                timer: 2000
            });
            
            // Cerrar modal y recargar tabla
            bootstrap.Modal.getInstance(document.getElementById('mascotaModal')).hide();
            loadMascotas();
            
        } else {
            throw new Error('Error al guardar mascota');
        }
        
    } catch (error) {
        console.error('Error al guardar mascota:', error);
        
        Swal.fire({
            icon: 'error',
            title: 'Error',
            text: 'No se pudo guardar la mascota'
        });
    }
}

/**
 * Cargar mascota para edición (modificar función existente)
 */
async function showMascotaForm(mascotaId = null) {
    // Limpiar formulario
    document.getElementById('mascotaForm').reset();
    removeMascotaFoto();
    
    // Título del modal
    document.getElementById('mascotaModalTitle').textContent = 
        mascotaId ? 'Editar Mascota' : 'Nueva Mascota';
    
    // Si es edición, cargar datos
    if (mascotaId) {
        try {
            const response = await authenticatedFetch(`/api/mascotas/${mascotaId}`);
            
            if (response && response.ok) {
                const data = await response.json();
                const mascota = data.data;
                
                // Cargar campos del formulario
                document.getElementById('mascotaId').value = mascota.id;
                document.getElementById('mascotaNombre').value = mascota.mascota_nombre;
                // ... otros campos ...
                
                // ============================================
                // CARGAR FOTO SI EXISTE
                // ============================================
                if (mascota.foto_url) {
                    showMascotaFotoPreview(mascota.foto_url);
                }
                // ============================================
            }
        } catch (error) {
            console.error('Error al cargar mascota:', error);
        }
    }
    
    // Mostrar modal
    const modal = new bootstrap.Modal(document.getElementById('mascotaModal'));
    modal.show();
}

/**
 * Renderizar tabla de mascotas (agregar columna de foto)
 */
function renderMascotasTable(mascotas) {
    const tbody = document.getElementById('mascotasTableBody');
    
    tbody.innerHTML = mascotas.map(m => `
        <tr>
            <td>
                ${m.foto_url ? 
                    `<img src="${m.foto_url}" alt="${m.mascota_nombre}" 
                         style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px;">` 
                    : '<i class="fas fa-paw fa-2x text-muted"></i>'}
            </td>
            <td>${m.mascota_nombre}</td>
            <td>${m.tipo}</td>
            <td>${m.raza || '-'}</td>
            <td>${m.numero_casa}</td>
            <td>${m.dueno_nombre || 'Comunitaria'}</td>
            <td>
                <button class="btn btn-sm btn-info" onclick="showMascotaForm(${m.id})">
                    <i class="fas fa-edit"></i>
                </button>
                <button class="btn btn-sm btn-danger" onclick="deleteMascota(${m.id})">
                    <i class="fas fa-trash"></i>
                </button>
            </td>
        </tr>
    `).join('');
}

</script>

</body>
</html>
