services:
  - type: web
    name: checkin-plaza-backend
    env: node
    plan: free
    buildCommand: bash build.sh
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: TZ
        value: America/Santiago
      # DATABASE_URL debe configurarse manualmente en el dashboard de Render
      # Formato: postgresql://postgres:password@db.xxxxx.supabase.co:5432/postgres
    healthCheckPath: /health
    autoDeploy: true
    branch: main
