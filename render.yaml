services:
  - type: web
    name: checkin-plaza-backend
    env: node
    plan: free
    buildCommand: |
      cd backend && npm install
      echo "Verificando estructura de archivos..."
      ls -la ../public/
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true  # Render genera automáticamente
      # Variables para PostgreSQL (Supabase)
      # DATABASE_URL se configura manualmente en el dashboard
      # Formato: postgresql://postgres:password@db.xxxxx.supabase.co:5432/postgres
    healthCheckPath: /health
    autoDeploy: true
    branch: main
